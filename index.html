<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Grand Line RP - Administration</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f1c40f; --gold-d: #b8860b; --navy: #0a1118; --parch: #f5e6c8; }
        body { margin: 0; background: var(--navy); color: var(--parch); font-family: 'Crimson Text', serif; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 300px; background: rgba(5,10,15,0.98); border-right: 2px solid var(--gold-d); display: flex; flex-direction: column; }
        .nav { display: grid; grid-template-columns: 1fr; background: var(--gold-d); gap: 1px; }
        .nav-btn { background: #050a0f; border: none; color: white; padding: 15px; cursor: pointer; font-family: 'Cinzel'; }
        .nav-btn.active { background: var(--gold-d); color: black; font-weight: bold; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .page { display: none; flex: 1; padding: 30px; overflow-y: auto; }
        .page.active { display: block; }
        .card { background: rgba(0,0,0,0.6); border: 1px solid var(--gold-d); padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .btn { background: var(--gold); border: none; padding: 10px 20px; font-family: 'Cinzel'; font-weight: bold; cursor: pointer; border-radius: 5px; width: 100%; margin-top: 10px; }
        #event-banner { background: #c0392b; color: white; padding: 10px; text-align: center; font-family: 'Cinzel'; font-weight: bold; display: none; }
        input, select, textarea { background: #000; border: 1px solid var(--gold-d); color: #fff; padding: 12px; border-radius: 5px; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="padding:30px; text-align:center;"><h2 style="color:var(--gold); font-family:Cinzel;">GP ADMIN</h2></div>
    <div class="nav">
        <button class="nav-btn active" onclick="tab('p-rp', event)">CHAT RP</button>
        <button class="nav-btn" onclick="tab('p-adm', event)">ADMINISTRATION</button>
    </div>
</div>

<div class="main">
    <div id="event-banner"></div>
    
    <div id="p-rp" class="page active">
        <div id="chat" style="height: 80vh; overflow-y: auto; margin-bottom: 20px;"></div>
        <div style="display:flex; gap:10px;">
            <input id="rp-input" placeholder="Votre action...">
            <button class="btn" style="width:150px; margin:0;" onclick="send()">ENVOYER</button>
        </div>
    </div>

    <div id="p-adm" class="page">
        <div id="adm-login">
            <h3>Connexion au Panel Administration</h3>
            <input type="password" id="adm-pass" placeholder="Entrez votre code secret...">
            <button class="btn" onclick="login()">S'AUTHENTIFIER</button>
        </div>

        <div id="adm-panel" style="display:none;">
            <h2 id="adm-rank-title" style="color:var(--gold); font-family:Cinzel;">Panel</h2>

            <div id="zone-master" class="card" style="display:none; border-color: #e74c3c;">
                <h3 style="color:#e74c3c;">⚙️ CONTRÔLE DU MONDE (MASTER)</h3>
                <label>Version du site :</label>
                <select onchange="socket.emit('set-version', {version: this.value, code: document.getElementById('adm-pass').value})">
                    <option value="v3">Version 3 (Actuelle)</option>
                    <option value="v2">Version 2</option>
                    <option value="v1">Version 1</option>
                </select>
            </div>

            <div id="zone-events" class="card" style="display:none;">
                <h3>🌍 GESTION DES ÉVÉNEMENTS MONDIAUX</h3>
                <label>Type d'événement :</label>
                <select id="event-type">
                    <option value="Tempête de neige">❄️ Tempête de neige</option>
                    <option value="Buster Call en cours !">🔥 BUSTER CALL</option>
                    <option value="Fête au village">🎉 Célébration</option>
                    <option value="Apparition d'un Monstre Marin">🐉 Monstre Marin</option>
                </select>
                <input id="event-custom" placeholder="Ou texte personnalisé...">
                <button class="btn" onclick="triggerEvent()">DÉCLENCHER L'ÉVÉNEMENT</button>
            </div>

            <div class="card">
                <h3>🗞️ JOURNAL / ANNONCES</h3>
                <textarea id="njc" placeholder="Message important pour la communauté..."></textarea>
                <button class="btn" onclick="alert('Journal mis à jour !')">PUBLIER</button>
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let myCode = "";

    socket.on('init', d => { if(d.worldEvent) updateBanner(d.worldEvent); });
    socket.on('update-version', v => document.body.className = v);
    socket.on('world-event-update', txt => updateBanner(txt));
    socket.on('system-message', t => alert(t));
    socket.on('rp-message', m => {
        document.getElementById('chat').innerHTML += `<div><b>${m.user}:</b> ${m.text}</div>`;
    });

    function updateBanner(txt) {
        const b = document.getElementById('event-banner');
        b.innerText = txt;
        b.style.display = 'block';
    }

    function login() {
        const pw = document.getElementById('adm-pass').value;
        socket.emit('admin-auth', pw, r => {
            if(r) {
                myCode = pw;
                document.getElementById('adm-login').style.display = 'none';
                document.getElementById('adm-panel').style.display = 'block';
                document.getElementById('adm-rank-title').innerText = "ACCÈS : " + r.level.toUpperCase();
                
                if(r.level === 'master') {
                    document.getElementById('zone-master').style.display = 'block';
                    document.getElementById('zone-events').style.display = 'block';
                } else if(r.level === 'supermodo') {
                    document.getElementById('zone-events').style.display = 'block';
                }
            } else alert("Code invalide !");
        });
    }

    function triggerEvent() {
        const type = document.getElementById('event-type').value;
        const custom = document.getElementById('event-custom').value;
        socket.emit('set-world-event', { eventType: type, customText: custom, code: myCode });
    }

    function tab(id, e) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.target.classList.add('active');
    }

    function send() {
        const i = document.getElementById('rp-input');
        socket.emit('rp-message', { user: "Admin", text: i.value });
        i.value = '';
    }
</script>
</body>
</html>
