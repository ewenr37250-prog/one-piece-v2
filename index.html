<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Line V4 - Horizon</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #game-ui { border: 2px solid #ffd700; padding: 20px; border-radius: 10px; background: #262626; min-width: 300px; text-align: center; }
        .stat { margin: 10px 0; font-size: 1.2rem; }
        .valeur { color: #ffd700; font-weight: bold; }
        .label { color: #aaa; text-transform: uppercase; font-size: 0.8rem; }
        h1 { color: #ff4500; text-shadow: 2px 2px #000; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="game-ui">
        <h1>GRAND LINE V4</h1>
        
        <div class="stat">
            <div class="label">Nom</div>
            <div id="p-name">-</div>
        </div>

        <div class="stat">
            <div class="label">Prime</div>
            <div id="p-bounty" class="valeur">0 ฿</div>
        </div>

        <div class="stat">
            <div class="label">Puissance</div>
            <div id="p-power" class="valeur">0 ⚡</div>
        </div>

        <hr style="border: 0.5px solid #444;">
        <div id="status" style="font-size: 0.7rem; color: #555;">Connexion en cours...</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>

    <script>
        // Connexion automatique au serveur Render
        const socket = io();

        // On demande un pseudo (tu pourras remplacer ça par un vrai formulaire plus tard)
        const myName = prompt("Entre ton nom de pirate :") || "Anonyme_" + Math.floor(Math.random() * 1000);
        const myFaction = "Pirate";

        // Dès que la connexion est établie
        socket.on('connect', () => {
            document.getElementById('status').innerText = "⚓ Connecté à Grand Line";
            // On rejoint le jeu
            socket.emit('join', { name: myName, faction: myFaction });
        });

        // Quand le serveur nous envoie nos données
        socket.on('update-all', (data) => {
            if (data.player) {
                document.getElementById('p-name').innerText = data.player.name;
                document.getElementById('p-bounty').innerText = data.player.bounty.toLocaleString() + " ฿";
                document.getElementById('p-power').innerText = data.power.toLocaleString() + " ⚡";
            }
        });

        socket.on('disconnect', () => {
            document.getElementById('status').innerText = "❌ Déconnecté du serveur";
        });
    </script>
</body>
</html>
