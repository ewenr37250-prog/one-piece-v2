<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>One Piece RP - Grand Line</title>
    <style>
        body { margin: 0; background: #0f172a; color: #e2e8f0; font-family: 'serif'; display: flex; height: 100vh; }
        #char-sheet { width: 300px; background: #1e293b; border-right: 3px solid #f1c40f; padding: 20px; }
        #main-rp { flex-grow: 1; display: flex; flex-direction: column; background: #0f172a; }
        #log { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .rp-system { color: #f1c40f; border-left: 3px solid #f1c40f; padding-left: 10px; margin: 10px 0; font-weight: bold; }
        
        /* Panel Admin Caché */
        #admin-panel { 
            display: none; position: fixed; right: 20px; top: 20px; 
            background: #450a0a; border: 2px solid red; padding: 15px; border-radius: 10px; z-index: 100;
        }
        input, button { margin: 5px 0; padding: 8px; width: 100%; }
        #btn-admin { position: fixed; bottom: 5px; left: 5px; opacity: 0.2; cursor: pointer; color: white; border:none; background:none; }
    </style>
</head>
<body>

    <div id="char-sheet">
        <h2 style="color: #f1c40f;">📜 FICHE</h2>
        <div id="p-name" style="font-size: 1.5em; font-weight: bold;">-</div>
        <hr>
        <div style="color: #f1c40f;">PRIME ACTUELLE :</div>
        <div id="p-bounty" style="font-size: 2em; color: #2ecc71;">0 ฿</div>
    </div>

    <div id="main-rp">
        <div id="log"></div>
        <div style="padding: 20px; background: #1e293b;">
            <input type="text" id="cmd" placeholder="Tapez votre action RP ici...">
        </div>
    </div>

    <div id="admin-panel">
        <h3 style="color: white; margin: 0;">🏛️ Conseil des 5 Doyens</h3>
        <input type="text" id="target-name" placeholder="Nom du pirate">
        <input type="number" id="new-bounty" placeholder="Nouvelle Prime (฿)">
        <button onclick="updateBounty()" style="background: green; color: white;">Modifier Prime</button>
        <hr>
        <input type="text" id="announcement" placeholder="Annonce Mondiale">
        <button onclick="sendGlobal()" style="background: gold;">Publier Journal</button>
    </div>

    <button id="btn-admin" onclick="checkAdmin()">.</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const myName = prompt("Votre nom RP ?") || "Pirate";
        let myBounty = 0;
        document.getElementById('p-name').innerText = myName;

        // Gestion Admin
        function checkAdmin() {
            const code = prompt("Code d'accès du Gouvernement Mondial :");
            if(code === "imu") document.getElementById('admin-panel').style.display = "block";
        }

        function updateBounty() {
            const target = document.getElementById('target-name').value;
            const amount = document.getElementById('new-bounty').value;
            socket.emit('admin-update-bounty', { target, amount });
        }

        function sendGlobal() {
            const msg = document.getElementById('announcement').value;
            socket.emit('admin-announcement', msg);
        }

        // Événements socket
        socket.on('rp-message', (data) => {
            const div = document.createElement('div');
            div.innerHTML = `<strong>${data.user} :</strong> ${data.text}`;
            document.getElementById('log').appendChild(div);
        });

        socket.on('bounty-updated', (data) => {
            if(myName === data.target) {
                myBounty = data.amount;
                document.getElementById('p-bounty').innerText = myBounty + " ฿";
            }
            const info = document.createElement('div');
            info.className = "rp-system";
            info.innerText = `⚠️ AVIS DE RECHERCHE : La prime de ${data.target} est désormais de ${data.amount} ฿ !`;
            document.getElementById('log').appendChild(info);
        });

        socket.on('global-alert', (text) => {
            const alert = document.createElement('div');
            alert.style.cssText = "background: #7f1d1d; color: white; padding: 10px; border: 2px solid #f1c40f; margin: 10px 0;";
            alert.innerHTML = `📢 <strong>ÉDITION SPÉCIALE JOURNAL :</strong> ${text}`;
            document.getElementById('log').prepend(alert);
        });

        document.getElementById('cmd').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                socket.emit('rp-message', { user: myName, text: document.getElementById('cmd').value });
                document.getElementById('cmd').value = "";
            }
        });
    </script>
</body>
</html>
