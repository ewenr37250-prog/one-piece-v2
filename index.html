<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Piece RP - V3</title>
    <style>
        :root { 
            --gold: #f1c40f; --dark: #121212; --card: #1e1e1e;
            --marine: #2980b9; --pirate: #c0392b; --revo: #27ae60; 
        }
        body { 
            background-color: var(--dark); color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; 
            display: flex; flex-direction: column; align-items: center; 
        }
        .hidden { display: none !important; }

        /* Écran de connexion */
        #auth-screen { 
            margin-top: 80px; border: 2px solid var(--gold); padding: 30px; 
            border-radius: 15px; background: var(--card); width: 300px;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.2); text-align: center;
        }
        input, select, button { 
            display: block; width: 100%; margin: 10px 0; padding: 12px; 
            border-radius: 5px; border: none; box-sizing: border-box;
        }
        button { background: var(--gold); color: black; font-weight: bold; cursor: pointer; }
        button:hover { background: #d4ac0d; }

        /* Interface de Jeu */
        #game-ui { width: 95%; max-width: 1000px; padding: 20px; }
        
        /* Navigation par onglets */
        nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-nav { background: #333; color: white; flex: 1; padding: 10px; }
        .btn-nav.active { background: var(--gold); color: black; }

        /* Barre de Stats */
        .stats-bar { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            background: var(--card); padding: 15px; border-radius: 10px; 
            border-bottom: 3px solid var(--gold); gap: 10px; text-align: center;
        }
        
        /* Contenu des Vues */
        .view { background: var(--card); padding: 20px; border-radius: 10px; margin-top: 10px; min-height: 200px; }
        .btn-action { background: #444; color: white; display: inline-block; width: auto; padding: 10px 25px; margin: 5px; }

        /* Chat & Leaderboard */
        #chat-box { height: 150px; background: #000; overflow-y: auto; padding: 10px; margin-top: 15px; border-radius: 5px; font-size: 0.9em; }
        #leaderboard-list { list-style: none; padding: 0; }
        #leaderboard-list li { padding: 8px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 style="color: var(--gold);">🏴‍☠️ OP V3</h1>
        <input type="text" id="username" placeholder="Nom du personnage...">
        <input type="password" id="password" placeholder="Mot de passe...">
        <select id="faction-select">
            <option value="pirate">Pirate</option>
            <option value="marine">Marine</option>
            <option value="revolutionnaire">Révolutionnaire</option>
        </select>
        <button onclick="login()">SE CONNECTER</button>
        <button onclick="register()" style="background: #444; color: white;">CRÉER UN COMPTE</button>
    </div>

    <div id="game-ui" class="hidden">
        <div class="stats-bar">
            <div>👤 <b id="p-name">-</b></div>
            <div>🎖️ <span id="p-grade">-</span></div>
            <div>💰 <span id="p-berries">0</span> ฿</div>
            <div>🔥 <span id="p-bounty">0</span> ฿</div>
        </div>

        <nav style="margin-top: 20px;">
            <button class="btn-nav active" onclick="showView('v-home', this)">🏠 ACCUEIL</button>
            <button class="btn-nav" onclick="showView('v-map', this)">🗺️ NAVIGUER</button>
            <button class="btn-nav" onclick="showView('v-leaderboard', this)">🏆 CLASSEMENT</button>
        </nav>

        <div id="v-home" class="view">
            <h3>Actions Disponibles</h3>
            <button class="btn-action" onclick="action('train')">🏋️ S'ENTRAÎNER</button>
            <button class="btn-action" onclick="action('pillage')">🏴‍☠️ PILLER / PATROUILLER</button>
            <div id="chat-box"></div>
            <input type="text" id="chat-input" placeholder="Parler sur le global..." onkeydown="if(event.key==='Enter') sendChat()">
        </div>

        <div id="v-map" class="view hidden">
            <h3>🗺️ Carte du Monde</h3>
            <p>Le système de voyage vers les îles (Loguetown, Alabasta...) sera disponible dès que tu auras configuré tes premières destinations !</p>
        </div>

        <div id="v-leaderboard" class="view hidden">
            <h3>🏆 Top 25 Mondiaux</h3>
            <div id="leaderboard-list">Chargement du classement...</div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myPlayer = null;

        // --- NAVIGATION ---
        function showView(viewId, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
            document.getElementById(viewId).classList.remove('hidden');
            btn.classList.add('active');
        }

        // --- AUTH ---
        function login() {
            socket.emit('auth:login', { name: document.getElementById('username').value, password: document.getElementById('password').value });
        }
        function register() {
            socket.emit('auth:register', { 
                name: document.getElementById('username').value, 
                password: document.getElementById('password').value, 
                faction: document.getElementById('faction-select').value 
            });
        }

        socket.on('auth:success', ({ player }) => {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            updateUI(player);
        });

        socket.on('auth:error', (msg) => alert(msg));

        // --- LOGIQUE JEU ---
        function action(type) { socket.emit(`action:${type}`); }

        socket.on('player:update', (player) => updateUI(player));

        function updateUI(p) {
            document.getElementById('p-name').innerText = p.name;
            document.getElementById('p-grade').innerText = p.grade;
            document.getElementById('p-berries').innerText = p.berries.toLocaleString();
            document.getElementById('p-bounty').innerText = p.bounty.toLocaleString();
        }

        // --- CHAT ---
        function sendChat() {
            const input = document.getElementById('chat-input');
            if(input.value.trim()) socket.emit('chat:send', { text: input.value });
            input.value = '';
        }
        socket.on('chat:message', (msg) => {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div><b style="color:var(--gold)">${msg.author}:</b> ${msg.text}</div>`;
            box.scrollTop = box.scrollHeight;
        });

        // --- LEADERBOARD ---
        socket.on('leaderboard:update', (list) => {
            const el = document.getElementById('leaderboard-list');
            el.innerHTML = list.map((p, i) => `
                <li>
                    <span>#${i+1} ${p.name} (${p.faction})</span>
                    <b style="color:var(--gold)">${p.bounty.toLocaleString()} ฿</b>
                </li>
            `).join('');
        });
    </script>
</body>
</html>
