<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Grand Line — Horizon V4</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050709; --bg2: #080c10;
            --gold: #c5a059; --border: rgba(197,160,89,0.15);
            --pirate: #ff4757; --marine: #2e86de; --revo: #2ed573;
        }
        body { background: var(--bg); color: #d1cedb; font-family: 'Crimson Text', serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        aside { width: 300px; background: var(--bg2); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        .logo { font-family: 'Cinzel', serif; color: var(--gold); text-align: center; margin-bottom: 20px; letter-spacing: 2px; }
        .card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 12px; margin-bottom: 10px; border-radius: 4px; }
        .label { font-size: 11px; color: var(--gold); text-transform: uppercase; display: block; }
        .val { font-family: 'Cinzel', serif; font-size: 16px; }

        /* MAIN */
        main { flex: 1; display: flex; flex-direction: column; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; background: rgba(255,255,255,0.03); border-left: 3px solid var(--gold); font-size: 15px; }
        .msg b { color: var(--gold); text-transform: uppercase; font-size: 12px; margin-right: 10px; }

        /* INPUT */
        .input-box { padding: 20px; background: var(--bg2); border-top: 1px solid var(--border); display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 4px; }
        button { background: var(--gold); border: none; padding: 0 20px; cursor: pointer; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>
    <aside>
        <div class="logo">GRAND LINE V4</div>
        <div class="card"><span class="label">Nom</span><span id="ui-name" class="val">-</span></div>
        <div class="card"><span class="label">Prime</span><span id="ui-bounty" class="val">0 ฿</span></div>
        <div class="card"><span class="label">Puissance</span><span id="ui-power" class="val" style="color:var(--gold)">0 ⚡</span></div>
        <div id="ui-faction" style="text-align:center; font-weight:bold; margin-top:10px;">-</div>
    </aside>
    <main>
        <div id="chat"></div>
        <div class="input-box">
            <input type="text" id="in" placeholder="Tapez votre message...">
            <button onclick="send()">ENVOYER</button>
        </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = prompt("Votre pseudo ?") || "Pirate";
        let myFaction = prompt("Faction (pirate/marine/revo) ?") || "pirate";

        socket.emit('join', { name: myName, faction: myFaction });

        function send() {
            const el = document.getElementById('in');
            if(el.value) { socket.emit('send-msg', { text: el.value }); el.value = ""; }
        }

        socket.on('receive-msg', m => {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="msg"><b>${m.user}</b> ${m.text}</div>`;
            chat.scrollTop = chat.scrollHeight;
        });

        socket.on('update-all', data => {
            document.getElementById('ui-name').innerText = data.player.name;
            document.getElementById('ui-bounty').innerText = data.player.bounty.toLocaleString() + " ฿";
            document.getElementById('ui-power').innerText = data.power.toLocaleString() + " ⚡";
            const fac = document.getElementById('ui-faction');
            fac.innerText = data.player.faction.toUpperCase();
            fac.style.color = `var(--${data.player.faction})`;
        });
    </script>
</body>
</html>
