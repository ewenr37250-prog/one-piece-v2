<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Le Chevreuil - Grand Line RPG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Metamorphic&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="rpg-ui-gold">

    <div id="auth" class="auth-overlay">
        <div class="wood-frame-large">
            <h1 class="gold-gradient">LOG-IN</h1>
            <div class="input-group">
                <input type="text" id="log-name" placeholder="Nom du Pirate...">
                <button id="btn-login" class="gold-plate-btn">PRENDRE LA MER</button>
            </div>
        </div>
    </div>

    <div id="game" class="game-container hidden">
        <header class="main-header">
            <div class="header-decor-left"></div>
            <nav class="nav-menu">
                <button data-target="view-accueil" class="nav-item">ACCUEIL</button>
                <button data-target="view-personnage" class="nav-item">PERSONNAGE</button>
                <button data-target="view-inventaire" class="nav-item">INVENTAIRE</button>
            </nav>
            <div class="title-shield">
                <span class="shield-text">LE CHEVREUIL</span>
            </div>
            <div class="header-right">
                <div class="bounty-tag">PRIME: <span id="bounty-value">0 ฿</span></div>
                <button id="btn-open-admin" class="gear-btn"><i class="fas fa-cog"></i></button>
            </div>
            <div class="header-decor-right"></div>
        </header>

        <div class="main-layout">
            <aside class="sidebar-wood">
                <div class="inner-leather">
                    <div class="character-card">
                        <div class="portrait-frame">
                            <img src="https://i.imgur.com/8Yv2Y4f.png" alt="Portrait">
                        </div>
                        <h2 id="player-name" class="gold-text">---</h2>
                        <p class="lvl-tag">NIVEAU <span id="player-level">1</span></p>
                    </div>

                    <div class="stats-bars">
                        <div class="bar-container hp">
                            <i class="fas fa-heart"></i>
                            <div class="bar-track"><div id="hp-fill" class="fill"></div></div>
                            <span id="hp-text">0 / 0</span>
                        </div>
                        <div class="bar-container xp">
                            <i class="fas fa-star"></i>
                            <div class="bar-track"><div id="xp-fill" class="fill"></div></div>
                            <span id="xp-text">0 / 0</span>
                        </div>
                    </div>

                    <div class="action-grid">
                        <button id="btn-train" class="action-orb"><i class="fas fa-khanda"></i><span>Entraîner</span></button>
                        <button id="btn-work" class="action-orb"><i class="fas fa-coins"></i><span>Travailler</span></button>
                    </div>
                </div>
            </aside>

            <main class="parchment-container">
                <div class="parchment-paper">
                    <div id="view-accueil" class="view-content active">
                        <h2 class="ink-title">Journal de Bord</h2>
                        <div class="ink-divider"></div>
                        <p>Les vagues murmurent ton nom, pirate. Quelle sera ta prochaine destination sur Grand Line ?</p>
                    </div>
                    
                    <div id="view-personnage" class="view-content hidden">
                        <h2 class="ink-title">Arbre de Compétences</h2>
                        <div class="skill-grid" id="skills-container">
                            </div>
                    </div>
                </div>
            </main>

            <aside class="sidebar-wood">
                <div class="inner-leather chat-layout">
                    <h3 class="gold-text center">COMMUNICATIONS</h3>
                    <div id="chat-messages" class="chat-display"></div>
                    <div class="chat-controls">
                        <input type="text" id="chat-text" placeholder="Écrire...">
                        <button id="chat-send"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <div id="admin-modal" class="modal-overlay hidden">
        <div class="navy-box">
            <button id="btn-close-admin" class="close-x">×</button>
            <h2 class="gold-gradient">QG DE MODÉRATION</h2>
            <div id="admin-login-section">
                <input type="password" id="modo-code" placeholder="Code d'accès...">
                <button id="btn-modo-login" class="gold-plate-btn">IDENTIFICATION</button>
            </div>
            <div id="admin-tools-section" class="hidden">
                <div id="modo-log" class="admin-logs"></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="main.js"></script>
</body>
</html>
