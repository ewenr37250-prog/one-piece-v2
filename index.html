<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Line Online - V1.4</title>
    <style>
        :root { --gold: #f1c40f; --marine: #2980b9; --pirate: #e74c3c; --admin: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; text-align: center; }
        
        .screen { display: none; padding: 20px; }
        .active { display: block; }

        /* Login Style */
        .login-box { background: #1e1e1e; padding: 30px; border-radius: 15px; border: 2px solid var(--gold); display: inline-block; margin-top: 50px; }
        input, select, button { padding: 12px; margin: 10px; border-radius: 5px; border: none; width: 250px; font-size: 16px; }
        button { cursor: pointer; font-weight: bold; background: var(--gold); color: black; }
        
        /* HUD & Actions */
        .hud { display: flex; justify-content: space-around; background: #222; padding: 15px; border-bottom: 3px solid var(--gold); }
        .stat-card { background: #333; padding: 10px; border-radius: 8px; min-width: 120px; }
        .action-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 40px; }
        .btn-action { height: 80px; background: #444; color: white; border: 2px solid white; }

        #admin-panel { background: #2c3e50; border: 2px solid var(--admin); margin: 20px; padding: 20px; border-radius: 10px; display: none; }
        #event-banner { background: var(--pirate); padding: 10px; display: none; font-weight: bold; position: fixed; width: 100%; top: 0; z-index: 100; }
    </style>
</head>
<body>

    <div id="event-banner">📢 MESSAGE SYSTEME</div>

    <section id="screen-login" class="screen active">
        <div class="login-box">
            <h1>🏴‍☠️ GRAND LINE</h1>
            <input type="text" id="username" placeholder="Nom du Pirate...">
            <br>
            <select id="faction-select" onchange="toggleSecret(this.value)">
                <option value="Pirate">Pirate</option>
                <option value="Marine">Marine</option>
                <option value="secret">Archives de Marie-Joie...</option>
            </select>
            <div id="secret-area" style="display:none;">
                <input type="password" id="secret-code" placeholder="Code d'Autorité">
            </div>
            <br>
            <button onclick="joinGame()">PRENDRE LA MER</button>
        </div>
    </section>

    <section id="screen-game" class="screen">
        <div class="hud">
            <div class="stat-card">👤 <span id="hud-name">-</span><br><small id="hud-role"></small></div>
            <div class="stat-card">💰 Berrys<br><b id="hud-berrys">0</b></div>
            <div class="stat-card">🔥 Prime<br><b id="hud-bounty">0</b></div>
        </div>

        <div class="action-grid">
            <button class="btn-action" onclick="sendAction('train')">🏋️ S'ENTRAÎNER</button>
            <button class="btn-action" onclick="sendAction('pillage')">🏴‍☠️ PILLER</button>
        </div>

        <div id="admin-panel">
            <h3 id="admin-title">🛠️ ADMINISTRATION</h3>
            <button onclick="sendAdmin('jail')" style="background:red">Prison (Impel Down)</button>
            <div id="super-admin" style="display:none;">
                <button onclick="sendAdmin('event-pillage')" style="background:var(--admin)">Lancer Event x2</button>
            </div>
        </div>
    </section>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        // 1. Afficher/Masquer le champ secret
        function toggleSecret(val) {
            document.getElementById('secret-area').style.display = (val === 'secret') ? 'block' : 'none';
        }

        // 2. Envoyer la demande de connexion
        function joinGame() {
            const user = document.getElementById('username').value;
            const fact = document.getElementById('faction-select').value;
            const code = document.getElementById('secret-code').value;

            if(!user) return alert("Choisis un nom !");

            socket.emit('join-game', {
                username: user,
                faction: fact,
                secretCode: code
            });
        }

        // 3. Réception du succès
        socket.on('login-success', (data) => {
            document.getElementById('screen-login').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            
            updateHUD(data);

            // Affichage des outils selon le grade
            if (data.level >= 1) {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('admin-title').innerText = "🛠️ PANEL : " + data.role;
            }
            if (data.level === 2) {
                document.getElementById('super-admin').style.display = 'block';
            }
        });

        socket.on('login-error', (msg) => alert(msg));

        // 4. Actions de jeu
        function sendAction(type) {
            socket.emit('player-action', { type: type });
        }

        function sendAdmin(cmd) {
            const target = prompt("Nom de la cible :");
            socket.emit('admin-command', { cmd: cmd, target: target });
        }

        function updateHUD(user) {
            document.getElementById('hud-name').innerText = user.username;
            document.getElementById('hud-role').innerText = user.role;
            document.getElementById('hud-berrys').innerText = user.berrys.toLocaleString();
            document.getElementById('hud-bounty').innerText = user.bounty.toLocaleString();
        }

        socket.on('event-start', (msg) => {
            const banner = document.getElementById('event-banner');
            banner.innerText = "📢 " + msg;
            banner.style.display = 'block';
            setTimeout(() => { banner.style.display = 'none'; }, 5000);
        });
    </script>
</body>
</html>
