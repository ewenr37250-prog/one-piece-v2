<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Grand Line RPG V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="auth-screen">
    <h1 class="title-main">GRAND LINE V3</h1>
    <input id="auth-name" placeholder="Nom du personnage">
    <input id="auth-pass" type="password" placeholder="Mot de passe">

    <select id="auth-faction">
        <option value="pirate">🏴‍☠️ Pirate</option>
        <option value="marine">🛡️ Marine</option>
        <option value="revolutionnaire">🐉 Révolutionnaire</option>
    </select>

    <select id="auth-class">
        <option value="Guerrier">⚔️ Guerrier</option>
        <option value="Tireur">🎯 Tireur</option>
        <option value="Navigateur">🧭 Navigateur</option>
        <option value="Médecin">🧪 Médecin</option>
        <option value="Charpentier">🔧 Charpentier</option>
        <option value="Espion">🕵️ Espion</option>
        <option value="Artiste Martial">🥋 Artiste Martial</option>
    </select>

    <button class="btn" onclick="register()">S'INSCRIRE</button>
    <button class="btn btn-secondary" onclick="login()">SE CONNECTER</button>
</div>

<div id="game-ui" class="hidden">
    <div class="stats-bar">
        <div>
            <b id="ui-name"></b> — <span id="ui-faction"></span> / <span id="ui-class"></span><br>
            Niveau <span id="ui-level"></span> — <span id="ui-xp"></span> XP
        </div>
        <div>
            <b id="ui-berries" class="berries"></b> ฿<br>
            Prime : <span id="ui-bounty"></span> ฿
        </div>
        <div>
            <button class="btn btn-small" onclick="askModoCode()">MODO</button>
        </div>
    </div>

    <div id="tabs">
        <button class="tab-btn active" onclick="openTab('profil', this)">Profil</button>
        <button class="tab-btn" onclick="openTab('quetes', this)">Quêtes</button>
        <button class="tab-btn" onclick="openTab('skills', this)">Compétences</button>
        <button class="tab-btn" onclick="openTab('events', this)">Événements</button>
        <button class="tab-btn" onclick="openTab('journal', this)">Journal</button>
        <button class="tab-btn" onclick="openTab('taverne', this)">Taverne</button>
    </div>

    <div id="tab-profil" class="tab">
        <h3>Profil & Actions</h3>
        <button id="btn-train" class="btn" onclick="doTrain()">🏋️ S'ENTRAÎNER</button>
        <div id="log-box" class="box"></div>
    </div>

    <div id="tab-quetes" class="tab hidden">
        <h3>Quêtes de Faction</h3>
        <div id="faction-quest-info" class="info-line"></div>
        <button class="btn" onclick="requestFactionQuest()">Obtenir / Voir quête de faction</button>
        <button class="btn" onclick="doFactionQuest()">Progresser quête de faction</button>

        <h3>Quêtes de Classe</h3>
        <div id="class-quest-info" class="info-line"></div>
        <button class="btn" onclick="requestClassQuest()">Obtenir / Voir quête de classe</button>
        <button class="btn" onclick="doClassQuest()">Progresser quête de classe</button>
    </div>

    <div id="tab-skills" class="tab hidden">
        <h3>Arbre de compétences</h3>
        <div>Points de talent : <span id="skill-tp">0</span></div>
        <div id="skill-tree-branches" class="skills-container"></div>
    </div>

    <div id="tab-events" class="tab hidden">
        <h3>Événement en cours</h3>
        <div id="current-event" class="box">Aucun événement actif.</div>

        <h3>Historique des événements</h3>
        <div id="event-history" class="box"></div>
    </div>

    <div id="tab-journal" class="tab hidden">
        <h3>Journal</h3>
        <div id="journal-box" class="box"></div>
    </div>

    <div id="tab-taverne" class="tab hidden">
        <h3>Taverne</h3>
        <div id="chat-box" class="box"></div>
        <input id="chat-input" class="chat-input" placeholder="Message..." onkeydown="if(event.key==='Enter') sendChat()">
    </div>
</div>

<div id="modo-panel" class="hidden panel-modo">
    <button class="btn btn-close" onclick="closeModoPanel()">X</button>
    <h2 class="title-modo">PANTHÉON — PANEL MODO</h2>

    <h3>Donner des Berries</h3>
    <input id="modo-target" placeholder="Nom du joueur">
    <input id="modo-amount" placeholder="Montant">
    <button class="btn" onclick="modoGiveBerries()">DONNER</button>

    <h3>Kick joueur</h3>
    <input id="modo-kick-target" placeholder="Nom du joueur">
    <button class="btn" onclick="modoKick()">KICK</button>

    <h3>Logs</h3>
    <div id="modo-log" class="box box-modo"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="main.js"></script>
</body>
</html>
