<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>One Piece RP V3 - Grand Line</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;700&family=Crimson+Text&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f1c40f; --gold-bright: #fff3a0; --gold-dark: #b8860b;
            --navy: #0a1118; --navy-light: #162533; --parchment: #f5e6c8;
            --glass: rgba(0, 0, 0, 0.75); --border-accent: rgba(241, 196, 15, 0.25);
        }

        * { box-sizing: border-box; transition: all 0.2s ease-in-out; }
        body {
            margin: 0; background: var(--navy); color: var(--parchment);
            font-family: 'Crimson Text', serif; height: 100vh; display: flex; overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 320px; background: rgba(5, 10, 15, 0.98); border-right: 2px solid var(--gold-dark);
            display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.5); z-index: 10;
        }
        .logo { padding: 30px 20px; text-align: center; border-bottom: 1px double var(--border-accent); }
        .logo h1 {
            font-family: 'Cinzel Decorative'; font-size: 20px; margin: 0;
            background: linear-gradient(to bottom, var(--gold-bright), var(--gold-dark));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .nav { display: grid; grid-template-columns: 1fr 1fr; background: var(--gold-dark); gap: 1px; }
        .nav-btn {
            background: var(--navy); border: none; color: var(--parchment); padding: 15px 5px;
            font-family: 'Cinzel'; font-size: 10px; cursor: pointer; text-transform: uppercase;
        }
        .nav-btn.active { background: var(--gold-dark); color: #000; font-weight: bold; }

        /* CONTENT */
        .main { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.3); }
        .page { display: none; flex: 1; overflow-y: auto; padding: 30px; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* CARDS & UI */
        .card {
            background: var(--glass); border: 1px solid var(--border-accent); border-radius: 12px;
            padding: 20px; margin-bottom: 20px; backdrop-filter: blur(10px);
        }
        .card:hover { border-color: var(--gold); transform: scale(1.01); }

        .progress-bar { height: 10px; background: #000; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold-dark), var(--gold)); box-shadow: 0 0 15px var(--gold); width: 0%; }

        .btn {
            background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold) 100%);
            border: 1px solid var(--gold-dark); color: #1a1a1a; padding: 10px 20px;
            font-family: 'Cinzel'; font-weight: bold; border-radius: 6px; cursor: pointer;
            box-shadow: 0 4px 0 #957500;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #957500; }

        #chat { display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px; }
        .msg { background: rgba(255,255,255,0.04); padding: 15px; border-radius: 8px; border-left: 4px solid var(--gold-dark); }
        .msg b { color: var(--gold); font-family: 'Cinzel'; }
        .msg.system { border-left-color: var(--gold); background: rgba(241,196,15,0.05); text-align: center; font-style: italic; }

        input, select, textarea { background: #000; border: 1px solid var(--gold-dark); color: #fff; padding: 12px; border-radius: 6px; }

        #j-view {
            background: #e2d1b3; background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            color: #2c1e11; padding: 40px; border-radius: 3px; border: 1px solid #bba47b;
        }

        #overlay {
            position: fixed; inset: 0; background: var(--navy); z-index: 1000;
            display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 15px;
        }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="font-family:'Cinzel Decorative'; color:var(--gold);">One Piece RP V3</h1>
    <input id="j-name" placeholder="Nom du personnage..." style="width:280px;">
    <select id="j-fact" style="width:280px;">
        <option value="pirate">🏴‍☠️ Pirate</option>
        <option value="marine">⚓ Marine</option>
        <option value="revo">🔥 Révolutionnaire</option>
    </select>
    <button class="btn" onclick="join()">PRENDRE LA MER</button>
</div>

<div class="sidebar">
    <div class="logo"><h1>GRAND LINE RP</h1></div>
    <div id="stats" style="padding:20px; border-bottom:1px solid var(--border-accent);"></div>
    <div class="nav">
        <button class="nav-btn active" onclick="tab('p-rp')">RP</button>
        <button class="nav-btn" onclick="tab('p-quest')">QUÊTES</button>
        <button class="nav-btn" onclick="tab('p-market')">MARCHÉ</button>
        <button class="nav-btn" onclick="tab('p-skill')">COMPÉTENCES</button>
        <button class="nav-btn" onclick="tab('p-journal')">JOURNAL</button>
        <button class="nav-btn" onclick="tab('p-adm')">ADMIN</button>
    </div>
    <div id="online" style="padding:20px; font-size:12px; overflow-y:auto;"></div>
</div>

<div class="main">
    <div id="p-rp" class="page active" style="display:flex; flex-direction:column; padding:0;">
        <div id="chat"></div>
        <div style="padding:20px; background:rgba(0,0,0,0.5); display:flex; gap:10px;">
            <input id="rp-in" placeholder="Racontez votre aventure..." style="flex:1;" onkeydown="if(event.key==='Enter')send()">
            <button class="btn" onclick="send()">ENVOYER</button>
        </div>
    </div>

    <div id="p-quest" class="page">
        <h2 style="font-family:'Cinzel';">Mizu Mizu Journal - Missions</h2>
        <div id="l-quest"></div>
    </div>

    <div id="p-market" class="page">
        <h2 style="font-family:'Cinzel';">Marché International</h2>
        <div id="l-market"></div>
    </div>

    <div id="p-skill" class="page">
        <h2 style="font-family:'Cinzel';">Arbre de Compétences</h2>
        <div id="l-skill"></div>
    </div>

    <div id="p-journal" class="page">
        <div id="j-lock" style="text-align:center; padding:50px;">
            <div style="font-size:50px; margin-bottom:20px;">🗞️</div>
            <button class="btn" onclick="socket.emit('buy-journal')">Acheter l'édition (100 ฿)</button>
        </div>
        <div id="j-view" style="display:none;">
            <h1 id="jt" style="font-family:'Cinzel Decorative'; text-align:center;"></h1>
            <hr style="border:0; border-top:1px solid #2c1e11;">
            <p id="jc" style="font-size:18px; line-height:1.6;"></p>
        </div>
    </div>

    <div id="p-adm" class="page">
        <div id="adm-form">
            <input type="password" id="adm-pw" placeholder="Code secret...">
            <button class="btn" onclick="auth()">ENTRER</button>
        </div>
        <div id="adm-panel" style="display:none;">
            <h2 id="adm-title">Panel Modération</h2>
            <div class="card">
                <h3>📢 Publier dans le Journal</h3>
                <input id="new-jt" placeholder="Titre..." style="width:100%; margin-bottom:10px;">
                <textarea id="new-jc" placeholder="Contenu de l'article..." style="width:100%; min-height:150px;"></textarea>
                <button class="btn" onclick="publishJournal()" style="margin-top:10px;">PUBLIER (100 ฿)</button>
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    let socket = io(), myData = {}, quests = [], isAdmin = false;

    function join() {
        const name = document.getElementById('j-name').value;
        const fact = document.getElementById('j-fact').value;
        if(!name) return alert("Nom requis !");
        socket.emit('join', { name, faction: fact });
        document.getElementById('overlay').style.display = 'none';
    }

    socket.on('init', d => {
        quests = d.quests;
        renderMarket(d.marketPrices);
        d.history.forEach(renderMsg);
    });

    socket.on('player-data', d => {
        myData = d;
        renderStats();
        renderQuests();
        renderSkills();
    });

    socket.on('rp-message', renderMsg);
    socket.on('system-message', t => renderMsg({ channel:'system', text:t }));
    socket.on('market-update', renderMarket);
    
    socket.on('quest-progress', ({ id, cur }) => {
        if(!myData.questProgress) myData.questProgress = {};
        myData.questProgress[id] = cur;
        renderQuests();
    });

    socket.on('journal-content', d => {
        document.getElementById('j-lock').style.display='none';
        document.getElementById('j-view').style.display='block';
        document.getElementById('jt').innerText = d.title;
        document.getElementById('jc').innerText = d.content;
    });

    function renderStats() {
        const thresholds = [0, 100, 400, 1000, 2500, 5000, 10000];
        const next = thresholds[myData.gradeIdx+1] || "MAX";
        const pct = next === "MAX" ? 100 : (myData.gradeXP / next) * 100;
        
        document.getElementById('stats').innerHTML = `
            <div style="font-family:'Cinzel'; color:var(--gold); font-size:18px;">${myData.name}</div>
            <div style="font-size:12px; opacity:0.8; margin-bottom:10px;">${myData.grade || 'Mousse'}</div>
            <div style="color:var(--gold); font-weight:bold;">💰 ${myData.bounty.toLocaleString()} ฿</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
            <div style="font-size:10px; text-align:right;">XP: ${myData.gradeXP} / ${next}</div>
        `;
    }

    function renderQuests() {
        document.getElementById('l-quest').innerHTML = quests.filter(q => q.faction === 'all' || q.faction === myData.faction).map(q => {
            const prog = myData.questProgress[q.id] || 0;
            const pct = (prog/q.goal)*100;
            return `<div class="card">
                <div style="color:var(--gold); font-family:'Cinzel'; font-weight:bold;">${q.title}</div>
                <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                <div style="font-size:11px; display:flex; justify-content:space-between;">
                    <span>Progression : ${prog}/${q.goal}</span>
                    <span style="color:var(--gold)">Récompense : ${q.reward.toLocaleString()} ฿</span>
                </div>
            </div>`;
        }).join('');
    }

    function renderMarket(prices) {
        document.getElementById('l-market').innerHTML = Object.entries(prices).map(([n, p]) => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b style="font-family:'Cinzel';">${n}</b><br><small style="color:var(--gold)">${p.toLocaleString()} ฿</small></div>
                <button class="btn" style="padding:5px 10px; font-size:10px;" onclick="socket.emit('buy-item', '${n}')">ACHETER</button>
            </div>`).join('');
    }

    function renderSkills() {
        const s = { force: '💪 Force Brute', intel: '🧠 Intelligence', haki: '✨ Haki', reading: '📜 Lecture Antique' };
        document.getElementById('l-skill').innerHTML = Object.entries(s).map(([k, l]) => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b>${l}</b><br><small>Niveau ${myData.skills[k] || 0}</small></div>
                <button class="btn" style="padding:5px 10px; font-size:10px;">AMÉLIORER (500 XP)</button>
            </div>`).join('');
    }

    function renderMsg(m) {
        const c = document.getElementById('chat');
        const d = document.createElement('div');
        d.className = `msg ${m.channel}`;
        d.innerHTML = m.channel === 'system' ? m.text : `<b>${m.user} :</b> ${m.text}`;
        c.appendChild(d);
        c.scrollTop = c.scrollHeight;
    }

    function send() {
        const i = document.getElementById('rp-in');
        if(!i.value.trim()) return;
        socket.emit('rp-message', { user: myData.name, text: i.value });
        i.value = '';
    }

    function tab(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }

    function auth() {
        const pw = document.getElementById('adm-pw').value;
        socket.emit('admin-auth', pw, r => {
            if(r) {
                isAdmin = r.level;
                document.getElementById('adm-form').style.display='none';
                document.getElementById('adm-panel').style.display='block';
                if(r.level === 'master') document.getElementById('adm-title').innerText = "CONSEIL DES CINQ DOYENS (MASTER)";
            } else alert("Code erroné !");
        });
    }

    function publishJournal() {
        const t = document.getElementById('new-jt').value;
        const c = document.getElementById('new-jc').value;
        const code = document.getElementById('adm-pw').value;
        if(!t || !c) return alert("Remplissez le titre et le contenu !");
        socket.emit('write-journal', { title: t, content: c, code });
        alert("Journal publié !");
    }
</script>
</body>
</html>
