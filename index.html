<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Grand Line RPG — Version Fonctionnelle</title>
    <style>
        body { background:#111; color:#eee; font-family:Arial; }
        .hidden { display:none; }
        button { padding:8px 12px; margin:4px; cursor:pointer; }
        #game-ui { margin-top:20px; }
        #chat-box, #log-box { height:150px; overflow-y:auto; background:#222; padding:8px; }
    </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
    <h2>Connexion</h2>
    <input id="auth-name" placeholder="Nom"><br>
    <input id="auth-pass" type="password" placeholder="Mot de passe"><br>

    <select id="auth-faction">
        <option value="pirate">Pirate</option>
        <option value="marine">Marine</option>
        <option value="revolutionnaire">Révolutionnaire</option>
    </select><br>

    <select id="auth-class">
        <option value="Guerrier">Guerrier</option>
        <option value="Tireur">Tireur</option>
        <option value="Navigateur">Navigateur</option>
        <option value="Médecin">Médecin</option>
        <option value="Charpentier">Charpentier</option>
        <option value="Espion">Espion</option>
        <option value="Artiste Martial">Artiste Martial</option>
    </select><br>

    <button onclick="register()">S'inscrire</button>
    <button onclick="login()">Se connecter</button>
</div>

<!-- GAME UI -->
<div id="game-ui" class="hidden">

    <h2 id="ui-name"></h2>
    <p>
        Faction : <span id="ui-faction"></span><br>
        Classe : <span id="ui-class"></span><br>
        Niveau : <span id="ui-level"></span><br>
        XP : <span id="ui-xp"></span><br>
        Berries : <span id="ui-berries"></span><br>
    </p>

    <h3>Actions</h3>
    <button onclick="doTrain()">S'entraîner</button>
    <button onclick="doFactionQuest()">Progresser quête faction</button>
    <button onclick="doClassQuest()">Progresser quête classe</button>

    <div id="log-box"></div>

    <h3>Quêtes</h3>
    <button onclick="requestFactionQuest()">Obtenir quête faction</button>
    <div id="faction-quest-info"></div>

    <button onclick="requestClassQuest()">Obtenir quête classe</button>
    <div id="class-quest-info"></div>

    <h3>Compétences</h3>
    Points de talent : <span id="skill-tp"></span>
    <div id="skill-tree-branches"></div>

    <h3>Taverne</h3>
    <div id="chat-box"></div>
    <input id="chat-input" placeholder="Message..." onkeydown="if(event.key==='Enter') sendChat()">

    <h3>Modo</h3>
    <button onclick="askModoCode()">Entrer code modo</button>

    <div id="modo-panel" class="hidden" style="background:#333; padding:10px;">
        <button onclick="closeModoPanel()">Fermer</button>
        <h3>Panel Modo</h3>

        <input id="modo-target" placeholder="Nom joueur">
        <input id="modo-amount" placeholder="Montant">
        <button onclick="modoGiveBerries()">Donner Berries</button>

        <input id="modo-kick-target" placeholder="Nom joueur">
        <button onclick="modoKick()">Kick</button>

        <div id="modo-log"></div>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let currentPlayer = null;

/* AUTH */
function register() {
    socket.emit("auth:register", {
        name: document.getElementById("auth-name").value,
        password: document.getElementById("auth-pass").value,
        faction: document.getElementById("auth-faction").value,
        classe: document.getElementById("auth-class").value
    });
}

function login() {
    socket.emit("auth:login", {
        name: document.getElementById("auth-name").value,
        password: document.getElementById("auth-pass").value
    });
}

socket.on("auth:success", ({ player }) => {
    currentPlayer = player;
    document.getElementById("auth-screen").classList.add("hidden");
    document.getElementById("game-ui").classList.remove("hidden");
    updateUI(player);
});

socket.on("auth:error", msg => alert(msg));

/* UI UPDATE */
function updateUI(p) {
    document.getElementById("ui-name").innerText = p.name;
    document.getElementById("ui-faction").innerText = p.faction;
    document.getElementById("ui-class").innerText = p.classe;
    document.getElementById("ui-level").innerText = p.level;
    document.getElementById("ui-xp").innerText = p.xp;
    document.getElementById("ui-berries").innerText = p.berries;
    document.getElementById("skill-tp").innerText = p.skillTree.talentPoints;

    renderSkillTree(p.skillTree);
    renderQuests(p);
}

socket.on("player:update", p => updateUI(p));

/* ACTIONS */
function doTrain() { socket.emit("action:train"); }
function doFactionQuest() { socket.emit("action:quest_progress", { type:"faction" }); }
function doClassQuest() { socket.emit("action:quest_progress", { type:"class" }); }

socket.on("action:result", d => addLog(d.text));

function addLog(t) {
    const box = document.getElementById("log-box");
    box.innerHTML += t + "<br>";
    box.scrollTop = box.scrollHeight;
}

/* QUÊTES */
function requestFactionQuest() { socket.emit("quest:request_faction"); }
function requestClassQuest() { socket.emit("quest:request_class"); }

socket.on("quest:faction_update", q => {
    document.getElementById("faction-quest-info").innerText =
        `${q.title} — ${q.progress}/${q.goal}`;
});

socket.on("quest:class_update", q => {
    document.getElementById("class-quest-info").innerText =
        `${q.title} — ${q.progress}/${q.goal}`;
});

function renderQuests(p) {
    document.getElementById("faction-quest-info").innerText =
        p.factionQuest ? p.factionQuest.title : "Aucune quête";
    document.getElementById("class-quest-info").innerText =
        p.classQuest ? p.classQuest.title : "Aucune quête";
}

/* SKILLS */
function renderSkillTree(tree) {
    const box = document.getElementById("skill-tree-branches");
    box.innerHTML = "";
    for (const b in tree.branches) {
        box.innerHTML += `
            ${b} : ${tree.branches[b]}/${tree.maxLevel}
            <button onclick="upgradeSkill('${b}')">+</button><br>
        `;
    }
}

function upgradeSkill(branch) {
    socket.emit("skill:upgrade", { branch });
}

socket.on("skill:update", tree => {
    currentPlayer.skillTree = tree;
    renderSkillTree(tree);
    document.getElementById("skill-tp").innerText = tree.talentPoints;
});

/* CHAT */
function sendChat() {
    const text = document.getElementById("chat-input").value;
    socket.emit("chat:send", { text });
    document.getElementById("chat-input").value = "";
}

socket.on("chat:message", m => {
    const box = document.getElementById("chat-box");
    box.innerHTML += `<b>${m.author}:</b> ${m.text}<br>`;
    box.scrollTop = box.scrollHeight;
});

/* MODO */
function askModoCode() {
    const code = prompt("Code Modo :");
    socket.emit("modo:login", code);
}

socket.on("modo:success", () => {
    document.getElementById("modo-panel").classList.remove("hidden");
});

socket.on("modo:fail", () => alert("Code incorrect"));

function closeModoPanel() {
    document.getElementById("modo-panel").classList.add("hidden");
}

function modoGiveBerries() {
    socket.emit("modo:give_berries", {
        target: document.getElementById("modo-target").value,
        amount: parseInt(document.getElementById("modo-amount").value)
    });
}

function modoKick() {
    socket.emit("modo:kick", {
        target: document.getElementById("modo-kick-target").value
    });
}

socket.on("modo:log", t => {
    document.getElementById("modo-log").innerHTML += t + "<br>";
});
</script>
</body>
</html>
