<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Grand Line — Horizon V3.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050709; --gold: #c5a059; --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(197, 160, 89, 0.15); --text: #d1cedb;
            --pirate: #ff4757; --marine: #2e86de; --revo: #2ed573;
        }

        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Crimson Text', serif; display: flex; height: 100vh; overflow: hidden; transition: filter 0.5s; }
        
        /* Animation Haki */
        @keyframes hakiShake {
            0% { transform: translate(2px, 2px); filter: grayscale(1) contrast(3); }
            25% { transform: translate(-2px, -3px); }
            50% { transform: translate(3px, 0px); }
            100% { transform: translate(0,0); filter: grayscale(0); }
        }
        .haki-active { animation: hakiShake 0.15s infinite; }

        .sidebar { width: 260px; background: #020405; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .nav-btn { background: none; border: none; color: #555; padding: 20px; text-align: left; font-family: 'Cinzel'; font-size: 10px; letter-spacing: 2px; cursor: pointer; }
        .nav-btn.active { color: var(--gold); border-left: 3px solid var(--gold); background: var(--glass); }

        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #event-bar { background: rgba(0,0,0,0.5); color: var(--gold); padding: 15px; text-align: center; font-family: 'Cinzel'; border-bottom: 1px solid var(--border); font-style: italic; }

        .page { display: none; flex: 1; padding: 40px; overflow-y: auto; }
        .page.active { display: block; }

        /* Wanted Poster */
        #poster-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .poster { width: 320px; background: #decba4; padding: 20px; border: 10px solid #1a120b; color: #1a120b; text-align: center; font-family: 'Cinzel'; }
        .poster-img { width: 100%; height: 230px; background-size: cover; border: 4px solid #1a120b; margin: 15px 0; filter: sepia(0.5); }

        .rank-card { background: var(--glass); border: 1px solid var(--border); padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { margin-bottom: 15px; border-left: 2px solid var(--border); padding-left: 15px; }
        input { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 5px; width: 100%; box-sizing: border-box; }
        .btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px 20px; font-family: 'Cinzel'; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div id="poster-overlay" onclick="this.style.display='none'">
    <div class="poster">
        <h1 style="font-size: 2.5em; margin:0;">WANTED</h1>
        <div id="p-img" class="poster-img"></div>
        <h2 id="p-name">--</h2>
        <div id="p-bounty" style="font-size: 1.5em; border-top: 2px solid #1a120b; padding-top: 10px;">0 ฿</div>
    </div>
</div>

<div id="login-overlay" style="position:fixed; inset:0; background:var(--bg); z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <h1 style="font-family:Cinzel; color:var(--gold); letter-spacing:10px;">GRAND LINE</h1>
    <input id="in-name" placeholder="VOTRE NOM" style="width:300px; margin-bottom:10px;">
    <select id="in-fact" style="width:300px; padding:10px; background:#000; color:white; border:1px solid var(--border);">
        <option value="pirate">Pirate</option>
        <option value="marine">Marine</option>
        <option value="revo">Révolutionnaire</option>
    </select>
    <button class="btn" onclick="join()" style="width:300px; margin-top:20px;">S'EMBARQUER</button>
</div>

<div class="sidebar">
    <div style="padding:40px 20px; text-align:center;">
        <h2 style="font-family:Cinzel; color:var(--gold); font-size:1.2em;">HORIZON V3.2</h2>
        <div id="p-stats" style="font-size:0.8em; opacity:0.5; margin-top:10px;"></div>
    </div>
    <button class="nav-btn active" onclick="tab('p-rp', event)">COMMUNICATION</button>
    <button class="nav-btn" onclick="tab('p-rank', event)">CLASSEMENT</button>
    <button class="nav-btn" onclick="tab('p-adm', event)">CONTRÔLE</button>
</div>

<div class="main">
    <div id="event-bar">--</div>
    <div id="p-rp" class="page active">
        <div id="chat"></div>
        <input id="rp-in" placeholder="Action RP..." onkeypress="if(event.key==='Enter')send()">
    </div>
    
    <div id="p-rank" class="page">
        <h2 style="font-family:Cinzel; color:var(--gold);">LES PLUS RECHERCHÉS</h2>
        <div id="rank-list"></div>
    </div>

    <div id="p-adm" class="page">
        <div id="adm-auth">
            <input type="password" id="adm-pass" placeholder="CODE SECRET">
            <button class="btn" onclick="auth()">VALIDER</button>
        </div>
        <div id="adm-ctrl" style="display:none;">
            <h3 id="adm-lvl" style="color:var(--gold);">ADMIN</h3>
            <div class="rank-card" style="flex-direction:column;">
                <h4>DIFFUSER WANTED</h4>
                <input id="std-target" placeholder="Nom du joueur">
                <input id="std-img" placeholder="URL Image">
                <button class="btn" onclick="sendPoster()">PUBLIER</button>
                <button class="btn" style="border-color:#8a2be2; color:#8a2be2;" onclick="useHaki()">HAKI DES ROIS</button>
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let myData = {}, admCode = "";

    function join() {
        const n = document.getElementById('in-name').value;
        const f = document.getElementById('in-fact').value;
        if(n) {
            socket.emit('join', {name:n, faction:f});
            document.getElementById('login-overlay').style.display='none';
        }
    }

    socket.on('init', d => {
        document.getElementById('event-bar').innerText = d.worldEvent;
        renderRank(d.players);
    });

    socket.on('player-data', d => {
        myData = d;
        document.getElementById('p-stats').innerText = `${d.bounty.toLocaleString()} ฿ — ${d.grade}`;
    });

    socket.on('rp-message', m => {
        const chat = document.getElementById('chat');
        chat.innerHTML += `<div class="msg"><b><span style="color:var(--${m.faction})">${m.user.toUpperCase()}</span></b><br>${m.text}</div>`;
        chat.scrollTop = chat.scrollHeight;
    });

    socket.on('haki-vibe', d => {
        document.body.classList.add('haki-active');
        document.getElementById('chat').innerHTML += `<div style="text-align:center; color:#8a2be2; font-family:Cinzel; padding:20px;">— ONDE DE CHOC DE ${d.user} —</div>`;
        setTimeout(() => document.body.classList.remove('haki-active'), 1500);
    });

    socket.on('show-poster', d => {
        document.getElementById('p-name').innerText = d.targetName.toUpperCase();
        document.getElementById('p-bounty').innerText = d.bounty.toLocaleString() + " ฿";
        document.getElementById('p-img').style.backgroundImage = `url(${d.imageUrl})`;
        document.getElementById('poster-overlay').style.display = 'flex';
        setTimeout(() => document.getElementById('poster-overlay').style.display='none', 8000);
    });

    function renderRank(players) {
        const list = document.getElementById('rank-list');
        const sorted = Object.values(players).sort((a,b) => b.bounty - a.bounty);
        list.innerHTML = sorted.map((p, i) => `
            <div class="rank-card">
                <span>#${i+1} <b style="color:var(--${p.faction})">${p.name}</b></span>
                <span style="color:var(--gold)">${p.bounty.toLocaleString()} ฿</span>
            </div>
        `).join('');
    }

    function auth() {
        const pw = document.getElementById('adm-pass').value;
        socket.emit('admin-auth', pw, r => {
            if(r) {
                admCode = pw;
                document.getElementById('adm-auth').style.display='none';
                document.getElementById('adm-ctrl').style.display='block';
                document.getElementById('adm-lvl').innerText = "RANG : " + r.level.toUpperCase();
            }
        });
    }

    function sendPoster() {
        const t = document.getElementById('std-target').value;
        const i = document.getElementById('std-img').value;
        socket.emit('send-poster', {targetName:t, imageUrl:i, code:admCode});
    }

    function useHaki() {
        socket.emit('use-haki', {user: myData.name, code: admCode});
    }

    function send() {
        const i = document.getElementById('rp-in');
        if(i.value) {
            socket.emit('rp-message', {user: myData.name, text: i.value});
            i.value = '';
        }
    }

    function tab(id, e) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.target.classList.add('active');
    }
</script>
</body>
</html>
