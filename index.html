<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GRAND LINE V1.2</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .card { border: 2px solid #ffd700; display: inline-block; padding: 20px; border-radius: 15px; background: #222; }
        .valeur { color: #ffd700; font-size: 24px; font-weight: bold; }
        .error-msg { color: #ff4444; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🏴‍☠️ GRAND LINE V1.2</h1>
        <p>Nom: <span id="p-name">-</span></p>
        <p>Prime: <span id="p-bounty" class="valeur">0</span> ฿</p>
        <p>Puissance: <span id="p-power" class="valeur">0</span> ⚡</p>
        <div id="status">Connexion...</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>

    <script>
        // Test si Socket.io est bien chargé
        if (typeof io === 'undefined') {
            document.getElementById('status').innerHTML = "<b style='color:red'>ERREUR: Socket.io introuvable</b>";
        } else {
            const socket = io();

            const myName = "Pirate_" + Math.floor(Math.random() * 1000);

            socket.on('connect', () => {
                document.getElementById('status').innerText = "✅ Connecté au serveur !";
                socket.emit('join', { name: myName, faction: "Pirate" });
            });

            socket.on('update-all', (data) => {
                console.log("Données reçues:", data);
                if (data.player) {
                    document.getElementById('p-name').innerText = data.player.name;
                    document.getElementById('p-bounty').innerText = data.player.bounty;
                    document.getElementById('p-power').innerText = data.power;
                    document.getElementById('status').innerText = "⚓ En mer";
                }
            });

            socket.on('connect_error', (err) => {
                document.getElementById('status').innerText = "❌ Erreur connexion: " + err.message;
            });
        }
    </script>
</body>
</html>
