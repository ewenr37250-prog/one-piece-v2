<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Grand Line - Horizon Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-sea: #05080a;
            --soft-gold: #c5a059;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(197, 160, 89, 0.15);
            --text-main: #d1cedb;
        }

        body { 
            margin: 0; background: var(--deep-sea); color: var(--text-main); 
            font-family: 'Crimson Text', serif; display: flex; height: 100vh; overflow: hidden;
        }

        /* Menu Latéral Immersif */
        .sidebar { 
            width: 260px; background: #030506; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 10;
        }

        .nav-btn { 
            background: none; border: none; color: #666; padding: 22px; text-align: left;
            font-family: 'Cinzel'; font-size: 11px; letter-spacing: 3px; cursor: pointer; transition: 0.5s;
        }
        .nav-btn.active { color: var(--soft-gold); background: rgba(197,160,89,0.05); box-shadow: inset 4px 0 0 var(--soft-gold); }

        .main { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* Bandeau d'événement "Cinéma" */
        #event-bar { 
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); color: var(--soft-gold);
            padding: 15px; text-align: center; font-family: 'Cinzel'; font-style: italic;
            border-bottom: 1px solid var(--border); font-size: 0.85em; letter-spacing: 1px;
        }

        .page { display: none; flex: 1; padding: 50px; overflow-y: auto; animation: slideUp 0.6s ease-out; }
        .page.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Cartes de Compétences - Effet Verre */
        .skill-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 30px; }
        .skill-card { 
            background: var(--glass); border: 1px solid var(--border); padding: 30px;
            border-radius: 20px; backdrop-filter: blur(12px); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .skill-card:hover { transform: scale(1.02); background: rgba(255,255,255,0.05); border-color: var(--soft-gold); }
        .skill-card h4 { font-family: 'Cinzel'; color: var(--soft-gold); margin: 0 0 15px 0; letter-spacing: 1px; }
        
        .btn { 
            background: transparent; border: 1px solid var(--soft-gold); color: var(--soft-gold);
            padding: 12px; font-family: 'Cinzel'; border-radius: 6px; cursor: pointer; transition: 0.3s; font-size: 0.8em;
        }
        .btn:hover:not(:disabled) { background: var(--soft-gold); color: #000; box-shadow: 0 0 15px rgba(197,160,89,0.3); }
        .btn:disabled { opacity: 0.15; cursor: not-allowed; border-color: #444; }

        #chat { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .msg { margin-bottom: 20px; animation: fadeIn 0.4s ease; }
        .msg b { color: var(--soft-gold); font-family: 'Cinzel'; font-size: 0.75em; letter-spacing: 1px; display: block; margin-bottom: 4px; }

        input { background: rgba(255,255,255,0.02); border: 1px solid var(--border); color: white; padding: 18px; border-radius: 12px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--soft-gold); background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div id="overlay" style="position:fixed; inset:0; background:var(--deep-sea); z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:30px;">
    <h1 style="font-family:Cinzel; color:var(--soft-gold); font-size: 2.8em; letter-spacing: 12px; margin:0;">GRAND LINE</h1>
    <div style="width: 40px; height: 1px; background: var(--soft-gold); opacity: 0.4;"></div>
    <input id="in-name" placeholder="ENTREZ VOTRE NOM" style="width:320px; text-align:center; font-family:Cinzel; font-size:0.8em;">
    <button class="btn" onclick="join()" style="width:320px; padding:18px;">COMMENCER LA TRAVERSÉE</button>
</div>

<div class="sidebar">
    <div style="padding:50px 20px; text-align:center;">
        <h2 style="font-family:Cinzel; color:var(--soft-gold); margin:0; font-size: 1.1em; letter-spacing: 2px;">V3 HORIZON</h2>
        <div id="p-stats" style="margin-top:20px; font-size:0.85em; opacity:0.5; font-style: italic;"></div>
    </div>
    <button class="nav-btn active" onclick="tab('p-rp', event)">COMMUNICATION</button>
    <button class="nav-btn" onclick="tab('p-skills', event)">CAPACITÉS</button>
    <button class="nav-btn" onclick="tab('p-adm', event)">CONTRÔLE</button>
</div>

<div class="main">
    <div id="event-bar">--</div>
    
    <div id="p-rp" class="page active" style="display:flex; flex-direction:column; padding: 0 40px;">
        <div id="chat"></div>
        <div style="display:flex; gap:20px; padding:30px 0;">
            <input id="rp-in" style="flex:1;" placeholder="Décrivez votre action ici...">
            <button class="btn" style="padding:0 40px;" onclick="send()">TRANSMETTRE</button>
        </div>
    </div>

    <div id="p-skills" class="page">
        <h2 style="font-family:Cinzel; color:var(--soft-gold); margin-bottom:40px; letter-spacing: 2px;">ARBRE DE COMPÉTENCES</h2>
        <div class="skill-grid" id="tree"></div>
    </div>

    <div id="p-adm" class="page" style="max-width: 600px;">
        <div id="adm-login">
            <h3 style="font-family:Cinzel; margin-bottom:30px;">AUTHENTIFICATION</h3>
            <input type="password" id="adm-pass" placeholder="CODE D'ACCÈS" style="width:100%; margin-bottom:20px;">
            <button class="btn" style="width:100%;" onclick="login()">VALIDER</button>
        </div>
        <div id="adm-ctrl" style="display:none;">
            <h3 id="adm-title" style="color:var(--soft-gold); font-family:Cinzel;">INTERFACE DE GESTION</h3>
            <div id="m-only" style="display:none; margin-top:40px;">
                <label style="font-size:0.7em; opacity:0.4; letter-spacing: 1px;">VERSION DU MONDE</label>
                <select onchange="adm('version', this.value)" style="width:100%; padding:18px; background:#000; color:white; border:1px solid var(--border); margin-top:10px; font-family:Cinzel; border-radius:10px;">
                    <option value="v3">Grand Line (Horizon)</option>
                    <option value="v2">Mer Bleue</option>
                    <option value="v1">Origines</option>
                </select>
            </div>
            <div id="s-only" style="display:none; margin-top:30px;">
                <label style="font-size:0.7em; opacity:0.4; letter-spacing: 1px;">DÉPÊCHE MONDIALE</label>
                <input id="ev-in" style="width:100%; margin-top:10px;" placeholder="Événement à déclencher...">
                <button class="btn" style="width:100%; margin-top:15px;" onclick="adm('event', document.getElementById('ev-in').value)">PUBLIER</button>
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io(); let myData = {}, currentCode = "";

    function join() {
        const n = document.getElementById('in-name').value;
        if(n) { socket.emit('join', { name: n }); document.getElementById('overlay').style.display='none'; }
    }

    socket.on('init', d => { document.getElementById('event-bar').innerText = d.worldEvent; });
    socket.on('world-event-update', t => document.getElementById('event-bar').innerText = t);
    socket.on('player-data', d => { myData = d; renderUI(); });
    socket.on('rp-message', m => { 
        document.getElementById('chat').innerHTML += `<div class="msg"><b>${m.user.toUpperCase()}</b>${m.text}</div>`;
        document.getElementById('chat').scrollTop = 9999;
    });

    function renderUI() {
        document.getElementById('p-stats').innerHTML = `${myData.bounty.toLocaleString()} ฿ — ${myData.skillPoints} SP DISPONIBLES`;
        const sk = [
            {id:'force', n:'PUISSANCE', d:'Force brute de vos assauts.', c:1},
            {id:'intel', n:'SAGESSE', d:'Navigation et instinct.', c:1},
            {id:'haki', n:'HAKI', d:'Volonté spirituelle éveillée.', c:3},
            {id:'reading', n:'ARCHIVES', d:'Lecture des textes anciens.', c:10}
        ];
        document.getElementById('tree').innerHTML = sk.map(s => `
            <div class="skill-card">
                <h4>${s.n}</h4>
                <div style="font-size:1.8em; color:white; margin-bottom:10px; font-family:Cinzel;">${myData.skills[s.id]}</div>
                <p style="font-size:0.85em; opacity:0.4; margin-bottom:25px; min-height:40px;">${s.d}</p>
                <button class="btn" onclick="socket.emit('upgrade-skill', '${s.id}')" ${myData.skillPoints < s.c ? 'disabled' : ''}>
                    ÉVOLUER (${s.c} SP)
                </button>
            </div>
        `).join('');
    }

    function send() {
        const i = document.getElementById('rp-in');
        if(i.value) { socket.emit('rp-message', { user: myData.name, text: i.value }); i.value = ''; }
    }

    function tab(id, e) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.target.classList.add('active');
    }

    function login() {
        const pw = document.getElementById('adm-pass').value;
        socket.emit('admin-auth', pw, r => {
            if(r) {
                currentCode = pw;
                document.getElementById('adm-login').style.display='none';
                document.getElementById('adm-ctrl').style.display='block';
                document.getElementById('adm-title').innerText = r.level.toUpperCase() + " ACCESS";
                if(r.level === 'master') { document.getElementById('m-only').style.display='block'; document.getElementById('s-only').style.display='block'; }
                if(r.level === 'supermodo') document.getElementById('s-only').style.display='block';
            }
        });
    }

    function adm(type, val) { socket.emit('admin-action', { type, value: val, code: currentCode }); }
</script>
</body>
</html>
