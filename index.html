<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>One Piece RP V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;700&family=Crimson+Text&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f1c40f; --navy: #0a1118; --parchment: #f5e6c8; --red: #c0392b; --blue: #2980b9; --green: #27ae60; }
        body { background: var(--navy); color: var(--parchment); font-family: 'Crimson Text', serif; margin: 0; height: 100vh; overflow: hidden; display: flex; }
        
        /* SIDEBAR */
        .sidebar { width: 280px; background: #0e1a24; border-right: 2px solid rgba(241,196,15,0.2); display: flex; flex-direction: column; }
        .logo { padding: 20px; text-align: center; border-bottom: 1px solid rgba(241,196,15,0.1); }
        .logo h1 { font-family: 'Cinzel Decorative'; font-size: 18px; color: var(--gold); margin: 0; }
        .stats { padding: 20px; border-bottom: 1px solid rgba(241,196,15,0.1); }
        .stat-line { display: flex; justify-content: space-between; margin-bottom: 5px; font-family: 'Cinzel'; font-size: 12px; }
        .progress-bar { height: 4px; background: #222; border-radius: 2px; overflow: hidden; margin-top: 5px; }
        .progress-fill { height: 100%; background: var(--gold); transition: 0.3s; }
        
        /* MAIN CONTENT */
        .main { flex: 1; display: flex; flex-direction: column; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 5px; border-left: 3px solid var(--gold); }
        .msg.system { border-left-color: var(--gold); color: var(--gold); font-style: italic; }
        .input-area { padding: 20px; background: #0e1a24; display: flex; gap: 10px; }
        input { background: rgba(0,0,0,0.3); border: 1px solid var(--gold); color: white; padding: 10px; border-radius: 5px; flex: 1; outline: none; }
        
        /* TABS */
        .tabs { display: flex; background: #0e1a24; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; color: var(--parchment); cursor: pointer; font-family: 'Cinzel'; font-size: 11px; }
        .tab-btn.active { border-bottom: 2px solid var(--gold); color: var(--gold); }
        .page { display: none; flex: 1; overflow-y: auto; padding: 20px; }
        .page.active { display: block; }

        /* QUÊTES V3 */
        .q-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--gold); }
        .q-title { font-family: 'Cinzel'; color: var(--gold); }
    </style>
</head>
<body>

<div id="join-screen" style="position:fixed; inset:0; background:var(--navy); z-index:100; display:flex; align-items:center; justify-content:center; flex-direction:column;">
    <h1 style="font-family:'Cinzel Decorative'; color:var(--gold);">One Piece RP V3</h1>
    <input id="join-name" placeholder="Nom de ton personnage..." style="max-width:300px; margin-bottom:10px;">
    <select id="join-faction" style="padding:10px; background:#000; color:var(--gold); border:1px solid var(--gold); margin-bottom:10px; width:300px;">
        <option value="pirate">Pirate</option>
        <option value="marine">Marine</option>
        <option value="revo">Révolutionnaire</option>
    </select>
    <button onclick="joinGame()" style="padding:10px 40px; background:var(--gold); border:none; cursor:pointer; font-family:'Cinzel';">PRENDRE LA MER</button>
</div>

<div class="sidebar">
    <div class="logo"><h1>GRAND LINE RP</h1></div>
    <div class="stats" id="player-stats">
        </div>
    <div style="padding:10px; font-family:'Cinzel'; font-size:10px; color:var(--gold); text-align:center;">MENU</div>
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('chat-page')">RP</button>
        <button class="tab-btn" onclick="showTab('quest-page')">QUETES</button>
        <button class="tab-btn" onclick="showTab('admin-page')">ADMIN</button>
    </div>
    <div id="online-list" style="padding:20px; font-size:13px;"></div>
</div>

<div class="main">
    <div id="chat-page" class="page active">
        <div id="chat"></div>
        <div class="input-area">
            <input id="rp-input" placeholder="Écrivez votre action..." onkeydown="if(event.key==='Enter')sendRP()">
            <button onclick="sendRP()" style="background:var(--gold); border:none; padding:10px 20px; cursor:pointer;">ENVOYER</button>
        </div>
    </div>
    <div id="quest-page" class="page">
        <h2 style="font-family:'Cinzel';">Mizu Mizu Journal - Quêtes</h2>
        <div id="quest-list"></div>
    </div>
    <div id="admin-page" class="page">
        <div id="admin-lock">
            <h3>Accès Doyen</h3>
            <input type="password" id="admin-pw" placeholder="Code secret...">
            <button onclick="authAdmin()">DÉVERROUILLER</button>
        </div>
        <div id="admin-panel" style="display:none;">
            <h2 id="admin-title">Panel Modération</h2>
            <div id="admin-controls"></div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    let socket = io();
    let myData = {};
    let quests = [];
    let isAdmin = false;

    function joinGame() {
        const name = document.getElementById('join-name').value;
        const faction = document.getElementById('join-faction').value;
        if(!name) return alert("Nom requis");
        socket.emit('join', { name, faction });
        document.getElementById('join-screen').style.display = 'none';
    }

    socket.on('init', data => {
        quests = data.quests;
        renderOnline(data.players);
        data.history.forEach(renderMsg);
    });

    socket.on('player-data', data => {
        myData = data;
        renderStats();
        renderQuests();
    });

    socket.on('player-list', list => renderOnline(list));
    socket.on('rp-message', msg => renderMsg(msg));
    socket.on('system-message', text => renderMsg({ channel:'system', text }));

    socket.on('quest-update-progress', ({ id, cur, goal }) => {
        myData.questProgress[id] = cur;
        renderQuests();
    });

    function renderStats() {
        const xpThresholds = [0, 100, 300, 800, 1500, 3000, 6000];
        const nextXP = xpThresholds[myData.gradeIdx + 1] || "MAX";
        const progress = nextXP === "MAX" ? 100 : (myData.gradeXP / nextXP) * 100;
        
        document.getElementById('player-stats').innerHTML = `
            <div class="stat-line"><span>${myData.name}</span><span style="color:var(--gold)">${myData.grade}</span></div>
            <div class="stat-line"><span>Prime</span><span style="color:var(--green)">${myData.bounty.toLocaleString()} ฿</span></div>
            <div class="stat-line"><span>Haki</span><span>Niveau ${myData.skills.haki}</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
            <div style="font-size:10px; text-align:right; margin-top:3px; color:rgba(255,255,255,0.4)">XP: ${myData.gradeXP} / ${nextXP}</div>
        `;
    }

    function renderQuests() {
        const html = quests.filter(q => q.faction === 'all' || q.faction === myData.faction).map(q => {
            const prog = myData.questProgress[q.id] || 0;
            const pct = Math.min(100, (prog/q.goal)*100);
            return `
                <div class="q-card">
                    <div class="q-title">${q.title}</div>
                    <div style="font-size:14px;">${q.desc || 'Faire du RP pour avancer.'}</div>
                    <div class="progress-bar" style="margin:10px 0;"><div class="progress-fill" style="width:${pct}%"></div></div>
                    <div style="font-size:11px; color:var(--gold)">Progression: ${prog}/${q.goal} | Récompense: ${q.reward.toLocaleString()} ฿</div>
                </div>`;
        }).join('');
        document.getElementById('quest-list').innerHTML = html;
    }

    function renderMsg(m) {
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = `msg ${m.channel}`;
        div.innerHTML = m.channel === 'system' ? m.text : `<strong>${m.user}:</strong> ${m.text}`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function sendRP() {
        const input = document.getElementById('rp-input');
        if(!input.value.trim()) return;
        socket.emit('rp-message', { user: myData.name, text: input.value });
        input.value = '';
    }

    function showTab(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }

    function authAdmin() {
        const pw = document.getElementById('admin-pw').value;
        socket.emit('admin-auth', pw, res => {
            if(res) {
                isAdmin = true;
                document.getElementById('admin-lock').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                if(res.level === 'master') document.getElementById('admin-title').innerText = "CONSEIL DES CINQ DOYENS (MASTER)";
            } else alert("Code erroné");
        });
    }

    function renderOnline(list) {
        document.getElementById('online-list').innerHTML = `<div style="color:var(--gold); margin-bottom:10px;">EN MER :</div>` + 
            Object.values(list).map(p => `<div>• ${p.name} (${p.grade})</div>`).join('');
    }
</script>
</body>
</html>
