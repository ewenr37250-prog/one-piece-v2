<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>One Piece RP V3 - Grand Line</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;700&family=Crimson+Text&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f1c40f; --navy: #0a1118; --parch: #f5e6c8; --dark: #070c11; }
        body { background: var(--navy); color: var(--parch); font-family: 'Crimson Text', serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        .sidebar { width: 300px; background: var(--dark); border-right: 2px solid rgba(241,196,15,0.2); display: flex; flex-direction: column; }
        .logo { padding: 20px; text-align: center; border-bottom: 1px solid rgba(241,196,15,0.1); }
        .logo h1 { font-family: 'Cinzel Decorative'; color: var(--gold); font-size: 18px; margin: 0; }
        
        .nav { display: grid; grid-template-columns: 1fr 1fr; background: rgba(0,0,0,0.2); }
        .nav-btn { padding: 12px; border: none; background: none; color: var(--parch); cursor: pointer; font-family: 'Cinzel'; font-size: 10px; border-bottom: 2px solid transparent; }
        .nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); background: rgba(241,196,15,0.05); }

        /* CONTENT */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .page { display: none; flex: 1; overflow-y: auto; padding: 25px; }
        .page.active { display: block; }
        
        /* CHAT & CARDS */
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 4px; border-left: 3px solid var(--gold); }
        .msg.system { border-left-color: var(--gold); color: var(--gold); font-style: italic; }
        
        .card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid rgba(241,196,15,0.1); }
        .btn { background: var(--gold); border: none; padding: 8px 15px; font-family: 'Cinzel'; cursor: pointer; border-radius: 4px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        input, select { background: #000; border: 1px solid var(--gold); color: white; padding: 10px; border-radius: 4px; }

        /* OVERLAY JOIN */
        #overlay { position: fixed; inset: 0; background: var(--navy); z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 15px; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="font-family:'Cinzel Decorative'; color:var(--gold);">One Piece RP V3</h1>
    <input id="j-name" placeholder="Nom du pirate..." style="width:250px;">
    <select id="j-fact" style="width:250px;">
        <option value="pirate">🏴‍☠️ Pirate</option>
        <option value="marine">⚓ Marine</option>
        <option value="revo">🔥 Révolutionnaire</option>
    </select>
    <button class="btn" onclick="join()">PRENDRE LA MER</button>
</div>

<div class="sidebar">
    <div class="logo"><h1>GRAND LINE</h1></div>
    <div id="stats" style="padding:20px; border-bottom:1px solid rgba(241,196,15,0.1);"></div>
    <div class="nav">
        <button class="nav-btn active" onclick="tab('p-rp')">RP</button>
        <button class="nav-btn" onclick="tab('p-quest')">QUÊTES</button>
        <button class="nav-btn" onclick="tab('p-market')">MARCHÉ</button>
        <button class="nav-btn" onclick="tab('p-skill')">SKILLS</button>
        <button class="nav-btn" onclick="tab('p-journal')">JOURNAL</button>
        <button class="nav-btn" onclick="tab('p-adm')">ADMIN</button>
    </div>
    <div id="online" style="padding:20px; font-size:12px;"></div>
</div>

<div class="main">
    <div id="p-rp" class="page active" style="display:flex; flex-direction:column; padding:0;">
        <div id="chat"></div>
        <div style="padding:20px; background:var(--dark); display:flex; gap:10px;">
            <input id="rp-in" placeholder="Votre action..." style="flex:1;" onkeydown="if(event.key==='Enter')send()">
            <button class="btn" onclick="send()">ENVOYER</button>
        </div>
    </div>

    <div id="p-quest" class="page">
        <h2 style="font-family:'Cinzel';">Mizu Mizu Journal - Quêtes</h2>
        <div id="l-quest"></div>
    </div>

    <div id="p-market" class="page">
        <h2 style="font-family:'Cinzel';">Marché International</h2>
        <div id="l-market"></div>
    </div>

    <div id="p-skill" class="page">
        <h2 style="font-family:'Cinzel';">Arbre de Compétences</h2>
        <div id="l-skill"></div>
    </div>

    <div id="p-journal" class="page">
        <div id="j-lock" style="text-align:center; padding:50px;">
            <button class="btn" onclick="socket.emit('buy-journal')">Acheter l'édition (100 ฿)</button>
        </div>
        <div id="j-view" style="display:none; background:var(--parch); color:#111; padding:30px; border-radius:4px;">
            <h1 id="jt" style="font-family:'Cinzel Decorative';"></h1>
            <p id="jc" style="font-size:18px; line-height:1.6;"></p>
        </div>
    </div>

    <div id="p-adm" class="page">
        <div id="adm-form">
            <input type="password" id="adm-pw" placeholder="Code secret...">
            <button class="btn" onclick="auth()">ENTRER</button>
        </div>
        <div id="adm-panel" style="display:none;">
            <h2 id="adm-title">Panel Admin</h2>
            <div class="card">
                <h3>📢 Mizu Mizu Journal (Éditeur)</h3>
                <input id="new-jt" placeholder="Titre..." style="width:100%; margin-bottom:5px;">
                <textarea id="new-jc" style="width:100%; background:#000; color:white; border:1px solid var(--gold); min-height:100px;"></textarea>
                <button class="btn" onclick="publishJournal()" style="margin-top:10px;">PUBLIER</button>
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    let socket = io(), myData = {}, quests = [], isAdmin = false;

    function join() {
        const name = document.getElementById('j-name').value;
        const fact = document.getElementById('j-fact').value;
        if(!name) return;
        socket.emit('join', { name, faction: fact });
        document.getElementById('overlay').style.display = 'none';
    }

    socket.on('init', d => {
        quests = d.quests;
        renderMarket(d.marketPrices);
        d.history.forEach(renderMsg);
    });

    socket.on('player-data', d => {
        myData = d;
        renderStats();
        renderQuests();
        renderSkills();
    });

    socket.on('rp-message', renderMsg);
    socket.on('system-message', t => renderMsg({ channel:'system', text:t }));
    socket.on('market-update', renderMarket);
    socket.on('journal-content', d => {
        document.getElementById('j-lock').style.display='none';
        document.getElementById('j-view').style.display='block';
        document.getElementById('jt').innerText = d.title;
        document.getElementById('jc').innerText = d.content;
    });

    function renderStats() {
        const next = [0, 100, 400, 1000, 2500, 5000][myData.gradeIdx+1] || "MAX";
        document.getElementById('stats').innerHTML = `
            <div style="font-family:'Cinzel'; color:var(--gold);">${myData.name}</div>
            <div style="font-size:12px; opacity:0.7;">${myData.grade || 'Mousse'}</div>
            <div style="margin-top:10px; color:var(--gold);">${myData.bounty.toLocaleString()} ฿</div>
            <div style="font-size:10px; margin-top:5px;">XP: ${myData.gradeXP} / ${next}</div>
        `;
    }

    function renderQuests() {
        document.getElementById('l-quest').innerHTML = quests.map(q => {
            const prog = myData.questProgress[q.id] || 0;
            const pct = (prog/q.goal)*100;
            return `<div class="card">
                <div style="color:var(--gold); font-family:'Cinzel';">${q.title}</div>
                <div style="height:4px; background:#222; margin:10px 0;"><div style="height:100%; background:var(--gold); width:${pct}%"></div></div>
                <div style="font-size:11px;">Progression : ${prog}/${q.goal} | Récompense : ${q.reward.toLocaleString()} ฿</div>
            </div>`;
        }).join('');
    }

    function renderMarket(prices) {
        document.getElementById('l-market').innerHTML = Object.entries(prices).map(([n, p]) => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b>${n}</b><br><small style="color:var(--gold)">${p.toLocaleString()} ฿</small></div>
                <button class="btn" onclick="socket.emit('buy-item', '${n}')">Acheter</button>
            </div>`).join('');
    }

    function renderSkills() {
        const skills = { force: 'Force', intel: 'Intelligence', haki: 'Haki', reading: 'Lecture Ponéglyphes' };
        document.getElementById('l-skill').innerHTML = Object.entries(skills).map(([k, l]) => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b>${l}</b><br><small>Niveau ${myData.skills[k] || 0}</small></div>
                <button class="btn" style="padding:5px 10px; font-size:10px;">Améliorer (500 XP)</button>
            </div>`).join('');
    }

    function renderMsg(m) {
        const c = document.getElementById('chat');
        const d = document.createElement('div');
        d.className = `msg ${m.channel}`;
        d.innerHTML = m.channel === 'system' ? m.text : `<b>${m.user}:</b> ${m.text}`;
        c.appendChild(d);
        c.scrollTop = c.scrollHeight;
    }

    function send() {
        const i = document.getElementById('rp-in');
        if(!i.value) return;
        socket.emit('rp-message', { user: myData.name, text: i.value });
        i.value = '';
    }

    function tab(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }

    function auth() {
        const pw = document.getElementById('adm-pw').value;
        socket.emit('admin-auth', pw, r => {
            if(r) {
                isAdmin = r.level;
                document.getElementById('adm-form').style.display='none';
                document.getElementById('adm-panel').style.display='block';
                if(r.level === 'master') document.getElementById('adm-title').innerText = "CONSEIL DES CINQ DOYENS (MASTER)";
            } else alert("Code erroné");
        });
    }

    function publishJournal() {
        const t = document.getElementById('new-jt').value;
        const c = document.getElementById('new-jc').value;
        const code = document.getElementById('adm-pw').value;
        socket.emit('write-journal', { title: t, content: c, code, price: 100 });
    }
</script>
</body>
</html>
