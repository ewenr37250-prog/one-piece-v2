<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Piece RP — Interface</title>

    <!-- Feuille de style principale -->
    <link rel="stylesheet" href="style.css">
</head>

<!-- Le thème sera appliqué dynamiquement via JS -->
<body class="theme-login fade-in">

    <div class="main-wrapper">

        <!-- ============================
             HEADER / TITRE PRINCIPAL
        ============================= -->
        <div class="panel halo marine">
            <div class="panel-content">
                <h1 class="panel-title dramatic">One Piece — Interface RP</h1>
                <p class="encre-soft">Bienvenue dans l’univers RP dynamique.</p>
            </div>
        </div>

        <!-- ============================
             ONGLET DE NAVIGATION
        ============================= -->
        <div class="tabs">
            <div class="tab active" data-tab="profil">Profil</div>
            <div class="tab" data-tab="chat">Chat</div>
            <div class="tab" data-tab="stats">Statistiques</div>
            <div class="tab" data-tab="modo">Modération</div>
        </div>

        <!-- ============================
             CONTENU DES ONGLET
        ============================= -->

        <!-- PROFIL -->
        <div class="panel tab-content" id="profil" style="display:block;">
            <div class="panel-content">

                <h2 class="section-title">Informations du joueur</h2>

                <div class="layout-columns">

                    <!-- Colonne gauche -->
                    <div class="flex-col gap">

                        <div class="block-rp mb-3">
                            <h3 class="section-title">Identité</h3>

                            <label>Nom :</label>
                            <input type="text" placeholder="Monkey D. Luffy">

                            <label class="mt-2">Faction :</label>
                            <select id="select-faction">
                                <option value="marine">Marine</option>
                                <option value="pirate">Pirate</option>
                                <option value="revo">Révolutionnaire</option>
                            </select>

                            <label class="mt-2">Grade :</label>
                            <select id="select-grade">
                                <option value="recrue">Recrue</option>
                                <option value="capitaine">Capitaine</option>
                                <option value="amiral">Amiral</option>
                            </select>

                            <button class="btn mt-3 sound-click" id="apply-theme">
                                Appliquer le thème
                            </button>
                        </div>

                    </div>

                    <!-- Colonne droite -->
                    <div class="flex-col">
                        <div class="portrait shadow-strong"
                             style="background-image:url('assets/portraits/default.jpg');">
                        </div>
                    </div>

                </div>

            </div>
        </div>

        <!-- CHAT -->
        <div class="panel tab-content" id="chat" style="display:none;">
            <div class="panel-content">

                <h2 class="section-title">Chat RP</h2>

                <div class="chat-box mb-3" id="chat-box">
                    <!-- Messages générés par JS -->
                </div>

                <div class="flex-between">
                    <input type="text" id="chat-input" placeholder="Écrire un message RP...">
                    <button class="btn sound-click" id="send-message">Envoyer</button>
                </div>

            </div>
        </div>

        <!-- STATISTIQUES -->
        <div class="panel tab-content" id="stats" style="display:none;">
            <div class="panel-content">

                <h2 class="section-title">Statistiques du joueur</h2>

                <div class="grid-3 mt-2">

                    <div class="block-rp text-center">
                        <h3 class="section-title">Prime</h3>
                        <p class="encre-dark">320 000 000 B</p>
                    </div>

                    <div class="block-rp text-center">
                        <h3 class="section-title">Niveau</h3>
                        <p class="encre-dark">47</p>
                    </div>

                    <div class="block-rp text-center">
                        <h3 class="section-title">Réputation</h3>
                        <p class="encre-dark">Respecté</p>
                    </div>

                </div>

            </div>
        </div>

        <!-- MODÉRATION -->
        <div class="panel-modo tab-content" id="modo" style="display:none;">
            <div class="panel-content">

                <h2 class="panel-title">Panneau de Modération</h2>

                <div class="block-rp mb-3">
                    <label>Message global :</label>
                    <textarea rows="3" placeholder="Annonce RP..."></textarea>
                    <button class="btn mt-2 sound-alert">Envoyer l’annonce</button>
                </div>

                <div class="block-rp">
                    <label>Sanction :</label>
                    <select>
                        <option>Avertissement</option>
                        <option>Mute 10 min</option>
                        <option>Mute 1h</option>
                        <option>Ban 24h</option>
                    </select>

                    <label class="mt-2">Cible :</label>
                    <input type="text" placeholder="Nom du joueur">

                    <button class="btn mt-3 sound-alert">Appliquer</button>
                </div>

            </div>
        </div>

    </div>

    <!-- Script principal -->
    <script src="main.js"></script>

</body>
</html>
