<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Piece RP - Grand Line</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --wood: #3d2b1f;
            --paper: #d2b48c;
            --gold: #c9a84c;
            --marine: #1e3a5f;
            --pirate: #7f1d1d;
            --revo: #14532d;
        }

        body {
            background: #000 url('https://www.transparenttextures.com/patterns/dark-wood.png'); /* Texture boisée */
            color: #f4e4bc;
            font-family: 'Special Elite', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Écran de connexion façon Parchemin */
        #auth-screen {
            margin-top: 50px;
            background: #e4d5b7 url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            color: #2b1d0e;
            padding: 40px;
            border-radius: 5px;
            border: 10px solid var(--wood);
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }

        h1 { font-family: 'Cinzel', serif; font-size: 2.5em; margin-bottom: 20px; text-shadow: 2px 2px 2px rgba(0,0,0,0.3); }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #8b5a2b;
            background: #fff9eb;
            font-family: 'Special Elite', serif;
            box-sizing: border-box;
        }

        button {
            background: var(--wood);
            color: var(--gold);
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid var(--gold);
        }

        button:hover { background: #5d4037; transform: scale(1.02); }

        /* HUD du jeu */
        #game-ui { width: 95%; max-width: 900px; padding: 20px; }

        .stats-bar {
            background: rgba(0,0,0,0.8);
            border: 2px solid var(--gold);
            padding: 15px;
            display: flex;
            justify-content: space-around;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .view {
            background: rgba(43, 29, 14, 0.9);
            border: 2px solid var(--gold);
            padding: 20px;
            border-radius: 5px;
        }

        /* Emblème en arrière-plan dynamique */
        .faction-bg {
            position: fixed;
            bottom: -50px;
            right: -50px;
            opacity: 0.15;
            width: 400px;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1>WANTED</h1>
        <p>REJOIGNEZ L'AVENTURE</p>
        <input type="text" id="username" placeholder="Nom du Pirate/Soldat...">
        <input type="password" id="password" placeholder="Mot de passe secret...">
        <select id="faction-select">
            <option value="pirate">🏴‍☠️ Équipage Pirate</option>
            <option value="marine">🛡️ Marine Royale</option>
            <option value="revolutionnaire">🐉 Armée Révolutionnaire</option>
        </select>
        <button onclick="login()">SE CONNECTER</button>
        <button onclick="register()" style="background:#5d4037">CRÉER UN PERSO</button>
    </div>

    <div id="game-ui" class="hidden">
        <div class="stats-bar">
            <div><b id="p-name"></b><br><small id="p-faction"></small></div>
            <div><b>GRADE:</b> <span id="p-grade"></span></div>
            <div><b>BERRIES:</b> <span id="p-berries"></span> ฿</div>
        </div>
        
        <div class="view">
            <button onclick="socket.emit('action:train')">🏋️ S'ENTRAÎNER (XP)</button>
            <button onclick="socket.emit('action:pillage')" style="margin-top:10px;">🏴‍☠️ PILLER LES CÔTES</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io(); // Connexion automatique

        function login() {
            const n = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(!n || !p) return alert("Remplis tes avis de recherche !");
            socket.emit('auth:login', { name: n, password: p });
        }

        function register() {
            const n = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const f = document.getElementById('faction-select').value;
            socket.emit('auth:register', { name: n, password: p, faction: f });
        }

        socket.on('auth:success', ({ player }) => {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            updateUI(player);
        });

        socket.on('auth:error', (msg) => alert(msg));
        socket.on('player:update', (p) => updateUI(p));

        function updateUI(p) {
            document.getElementById('p-name').innerText = p.name;
            document.getElementById('p-grade').innerText = p.grade;
            document.getElementById('p-berries').innerText = p.berries.toLocaleString();
            document.getElementById('p-faction').innerText = p.faction.toUpperCase();
        }

        socket.on('connect', () => console.log("⚓ Connecté à Grand Line !"));
    </script>
</body>
</html>
