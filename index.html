<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><title>One Piece Horizon V3</title>
    <style>
        :root { --gold: #d4af37; --dark: #0d1117; --pirate: #ff4d4d; --marine: #4d94ff; --revo: #4dff88; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; }
        #mizu-journal { background: #fdf5e6; color: #5d4037; padding: 10px; text-align: center; border-bottom: 4px double #8b4513; font-weight: bold; }
        .game { display: flex; height: 90vh; }
        .side { width: 300px; background: #161b22; padding: 15px; border-right: 1px solid #333; overflow-y: auto; }
        .chat { flex: 1; display: flex; flex-direction: column; background: #000; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; }
        .tabs { display: flex; background: #222; }
        .tabs button { flex: 1; padding: 10px; border: none; color: white; cursor: pointer; }
        .tabs button.active { background: var(--gold); color: black; }
        .input-box { display: flex; padding: 15px; background: #161b22; }
        input { flex: 1; background: #0d1117; border: 1px solid #333; color: white; padding: 10px; border-radius: 5px; }
        .card { border: 1px solid var(--gold); padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .rank-item { font-size: 0.8em; margin-bottom: 5px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>
    <div id="login" style="padding: 100px; text-align: center;">
        <h1>HORIZON V3</h1>
        <input id="nick" placeholder="Pseudo"><br><br>
        <select id="faction"><option value="pirate">Pirate</option><option value="marine">Marine</option><option value="revo">Révolutionnaire</option></select><br><br>
        <button onclick="join()">Prendre la Mer</button>
    </div>

    <div id="ui" style="display:none">
        <div id="mizu-journal">📰 JOURNAL : <span id="j-text">...</span></div>
        <div class="game">
            <div class="side">
                <div class="card"><h2 id="me-name"></h2><p id="me-grade"></p><p>฿ <span id="me-bounty"></span></p><p>⚡ <span id="me-power"></span></p></div>
                <button onclick="socket.emit('quest')" style="width:100%; padding:10px;">Lancer Mission RP</button>
                <hr>
                <h4>COMPÉTENCES (100 XP)</h4>
                <button onclick="socket.emit('upgrade-skill', 'force')">Force</button>
                <button onclick="socket.emit('upgrade-skill', 'intel')">Intelligence</button>
                <div id="p-warn" style="display:none; color:red; font-size:0.7em;">📖 Lecteur de Poneglyphes</div>
                <hr>
                <h4>CLASSEMENT</h4><div id="rank-list"></div>
            </div>
            <div class="chat">
                <div class="tabs"><button id="b-glob" class="active" onclick="setTab('global')">GLOBAL</button><button id="b-fac" onclick="setTab('faction')">RADIO</button></div>
                <div id="messages"></div>
                <div class="input-box"><input id="in-chat" placeholder="Action... (/admin)" onkeypress="handle(event)"></div>
            </div>
        </div>
    </div>

    <div id="admin" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); padding:50px;">
        <div style="background:#222; padding:20px; border:1px solid gold;">
            <h3>PANEL TARTIFLETTE</h3>
            <input id="ad-t" placeholder="Cible"><br><br>
            <button onclick="admin('give-fruit')">Donner Fruit</button>
            <button onclick="admin('set-journal')">Changer Journal</button>
            <button onclick="document.getElementById('admin').style.display='none'">Fermer</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "", tab = "global", aCode = "";

        function join() {
            myName = document.getElementById('nick').value;
            const faction = document.getElementById('faction').value;
            if(!myName) return;
            socket.emit('join', { name: myName, faction });
            document.getElementById('login').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
        }

        function setTab(t) {
            tab = t;
            document.getElementById('b-glob').className = t === 'global' ? 'active' : '';
            document.getElementById('b-fac').className = t === 'faction' ? 'active' : '';
        }

        function handle(e) {
            if(e.key === 'Enter') {
                const i = document.getElementById('in-chat');
                if(i.value === "/admin") {
                    aCode = prompt("Code ?");
                    document.getElementById('admin').style.display = 'block';
                } else {
                    socket.emit('send-msg', { text: i.value, type: tab });
                }
                i.value = "";
            }
        }

        socket.on('receive-msg', m => {
            const box = document.getElementById('messages');
            const c = m.type === 'global' ? '#fff' : '#f1c40f';
            box.innerHTML += `<div style="color:${c}"><b>[${m.type.toUpperCase()}] ${m.user}:</b> ${m.text}</div>`;
            box.scrollTop = box.scrollHeight;
        });

        socket.on('update-all', ({ players, world }) => {
            const me = players[myName];
            if(me) {
                document.getElementById('me-name').innerText = me.name;
                document.getElementById('me-grade').innerText = me.grade;
                document.getElementById('me-bounty').innerText = me.bounty.toLocaleString();
                document.getElementById('me-power').innerText = me.power;
                if(me.canRead) document.getElementById('p-warn').style.display = 'block';
            }
            document.getElementById('j-text').innerText = world.journal;
            document.getElementById('rank-list').innerHTML = Object.values(players).sort((a,b)=>b.power-a.power).map(p=>`<div class="rank-item" style="color:var(--${p.faction})">${p.name} (⚡${p.power})</div>`).join('');
        });

        function admin(action) {
            let data = { target: document.getElementById('ad-t').value };
            if(action === 'set-journal') data.text = prompt("Texte ?");
            if(action === 'give-fruit') { data.name = prompt("Nom ?"); data.coeff = 2.5; }
            socket.emit('admin-action', { code: aCode, action, data });
        }
    </script>
</body>
</html>
